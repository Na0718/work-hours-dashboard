<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工时成本分析看板 | 5/18-5/31</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f0f2f5;--card:#fff;--primary:#1a73e8;--primary-light:#e8f0fe;--text:#202124;--text-secondary:#5f6368;--border:#e0e0e0;--green:#34a853;--orange:#ea8600;--red:#d93025;--purple:#9334e6;--teal:#00897b;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.dashboard{max-width:1440px;margin:0 auto;padding:20px 24px}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
header h1{font-size:22px;font-weight:600;color:var(--text)}
header h1 span{font-size:13px;color:var(--text-secondary);font-weight:400;margin-left:8px}
.badge{background:var(--primary-light);color:var(--primary);padding:4px 12px;border-radius:16px;font-size:12px;font-weight:500}
.filters{background:var(--card);border-radius:12px;padding:16px 20px;margin-bottom:20px;box-shadow:var(--shadow);display:flex;gap:16px;align-items:end;flex-wrap:wrap}
.filter-group{display:flex;flex-direction:column;gap:4px;min-width:200px}
.filter-group label{font-size:12px;font-weight:500;color:var(--text-secondary)}
.filter-group select{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);background:#fff;cursor:pointer;outline:none;transition:border-color .2s}
.filter-group select:focus{border-color:var(--primary)}
.btn-reset{padding:8px 20px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;transition:background .2s;height:36px}
.btn-reset:hover{background:#1557b0}
.section-title{font-size:16px;font-weight:600;color:var(--text);margin:28px 0 14px;padding-left:12px;border-left:4px solid var(--primary);line-height:1}
.kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:20px}
.kpi-card{background:var(--card);border-radius:12px;padding:18px 20px;box-shadow:var(--shadow)}
.kpi-card .kpi-label{font-size:12px;color:var(--text-secondary);margin-bottom:6px;font-weight:500}
.kpi-card .kpi-value{font-size:26px;font-weight:700;color:var(--text)}
.kpi-card .kpi-sub{font-size:11px;color:var(--text-secondary);margin-top:4px}
.kpi-card.highlight{border-left:3px solid var(--primary)}
.kpi-card.green .kpi-value{color:var(--green)}
.kpi-card.orange .kpi-value{color:var(--orange)}
.kpi-card.red .kpi-value{color:var(--red)}
.kpi-card.purple .kpi-value{color:var(--purple)}
.kpi-card.teal .kpi-value{color:var(--teal)}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.chart-card{background:var(--card);border-radius:12px;padding:20px;box-shadow:var(--shadow)}
.chart-card h3{font-size:14px;font-weight:600;margin-bottom:14px;color:var(--text)}
.chart-card.full{grid-column:1/-1}
.chart-container{position:relative;width:100%;height:320px}
.chart-container.tall{height:400px}
.table-section{background:var(--card);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px}
.table-section h3{font-size:14px;font-weight:600;padding:16px 20px 12px;color:var(--text);border-bottom:1px solid var(--border)}
.table-wrap{overflow-x:auto;max-height:420px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{position:sticky;top:0;z-index:2}
th{background:#f8f9fa;padding:10px 14px;text-align:left;font-weight:600;color:var(--text-secondary);border-bottom:2px solid var(--border);white-space:nowrap}
td{padding:9px 14px;border-bottom:1px solid #f0f0f0;white-space:nowrap}
tr:hover td{background:#f8f9fb}
.num{text-align:right;font-variant-numeric:tabular-nums}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.tag-high{background:#fce8e6;color:var(--red)}
.tag-mid{background:#fef7e0;color:var(--orange)}
.tag-low{background:#e6f4ea;color:var(--green)}
.footer{text-align:center;font-size:11px;color:var(--text-secondary);padding:16px 0}
#drillModalTable th{background:#f8f9fa;padding:10px 14px;text-align:left;font-weight:600;color:var(--text-secondary);border-bottom:2px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:1}
#drillModalTable td{padding:9px 14px;border-bottom:1px solid #f0f0f0;white-space:nowrap}
#drillModalTable tr:hover td{background:#f8f9fb}
#drillModalTable .num{text-align:right;font-variant-numeric:tabular-nums}
@media(max-width:1024px){.kpi-row{grid-template-columns:repeat(3,1fr)}.charts-row{grid-template-columns:1fr}}
@media(max-width:640px){.kpi-row{grid-template-columns:repeat(2,1fr)}.filters{flex-direction:column}}
</style>
</head>

<div class="dashboard">

  </header>

  <div class="filters" id="filters">

      <label>三级组织</label>
      <select id="f-org3"><option value="">全部</option></select>
    </div>
    <div class="filter-group">
      <label>四级组织</label>
      <select id="f-org4"><option value="">全部</option></select>
    </div>
    <div class="filter-group">
      <label>五级组织</label>
      <select id="f-org5"><option value="">全部</option></select>
    </div>
    <button class="btn-reset" onclick="resetFilters()">重置筛选</button>

  <!-- ===== 人力成本分析（置顶） ===== -->
  <div class="section-title">人力成本分析</div>
  <div class="kpi-row" id="kpiCost"></div>

  <div class="chart-card full" style="margin-bottom:20px">
    <h3>四级组织 — 成本总额 & 加班工资占比</h3>
    <div class="chart-container tall"><canvas id="chartCostTotal"></canvas></div>
  </div>

  <div class="chart-card full" style="margin-bottom:20px">
    <h3>四级组织 — 单位工时成本 ($/h)</h3>
    <div class="chart-container tall"><canvas id="chartCostEff"></canvas></div>
  </div>

  <!-- ===== 工时分析 ===== -->
  <div class="section-title">工时分析</div>
  <div class="kpi-row" id="kpiHours"></div>

  <div class="chart-card full" style="margin-bottom:20px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <h3 style="margin:0" id="avgOtTitle">四级组织 — 人均工时 & 加班率</h3>
      <div style="display:flex;gap:12px;align-items:center">
        <div style="display:flex;align-items:center;gap:4px">
          <label style="font-size:12px;color:#5f6368;white-space:nowrap">四级组织</label>
          <select id="avgOt-org4" style="padding:6px 10px;border:1px solid #e0e0e0;border-radius:6px;font-size:12px;min-width:160px"></select>
        </div>
      </div>
    </div>
    <div class="chart-container tall"><canvas id="chartAvgOt"></canvas></div>
  </div>

  <div class="chart-card full" style="margin-bottom:20px">
    <h3>四级组织多维度对比 — 工时总量趋势（折线图）</h3>
    <div class="chart-container tall"><canvas id="chartLineHours"></canvas></div>
  </div>
  <div class="charts-row">
    <div class="chart-card">
      <h3>四级组织多维度对比 — 人均指标（折线图）</h3>
      <div class="chart-container tall"><canvas id="chartLineAvg"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>四级组织多维度对比 — 效率与负荷（折线图）</h3>
      <div class="chart-container tall"><canvas id="chartLineRate"></canvas></div>
    </div>
  </div>

  <!-- ===== 汇总表格 ===== -->
  <div class="section-title">汇总与明细</div>
  <div class="table-section">
    <h3>四级组织汇总</h3>
    <div class="table-wrap"><table id="tblOrg4"></table></div>
  </div>
  <div class="table-section">
    <h3>五级组织汇总</h3>
    <div class="table-wrap"><table id="tblOrg5"></table></div>
  </div>
  <div class="table-section">
    <h3>员工明细</h3>
    <div class="table-wrap"><table id="tblDetail"></table></div>
  </div>

  <div id="drillModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:9999;justify-content:center;align-items:center">
    <div style="background:#fff;border-radius:12px;width:92%;max-width:1000px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.18)">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid #e0e0e0">
        <h3 style="margin:0;font-size:15px;color:#202124" id="drillModalTitle">员工明细</h3>
        <button onclick="closeDrillModal()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#5f6368;padding:0 4px;line-height:1">&times;</button>
      </div>
      <div style="overflow:auto;padding:0;flex:1">
        <table id="drillModalTable" style="width:100%;border-collapse:collapse;font-size:13px"></table>
      </div>
    </div>
  </div>

  <div class="footer">数据来源：工时成本数据0518-0531.xlsx · 看板生成时间 2026-06-24</div>
</div>

function populateAvgOtDropdowns() {

}

function populateFilters() {
  var org3s = [...new Set(DATA.map(function(d){return d.org3}).filter(Boolean))].sort();

  org3s.forEach(function(v){var o=document.createElement('option');o.value=v;o.textContent=v;sel3.appendChild(o)});

}

function updateOrg4Options() {
  var org3 = document.getElementById('f-org3').value;
  var filtered = DATA.filter(function(d){return !org3 || d.org3 === org3});
  var org4s = [...new Set(filtered.map(function(d){return d.org4}).filter(Boolean))].sort();

  updateOrg5Options();
}

function updateOrg5Options() {
  var org3 = document.getElementById('f-org3').value;

  var org5s = [...new Set(filtered.map(function(d){return d.org5}).filter(Boolean))].sort();

function bindEvents() {
  document.getElementById('f-org3').addEventListener('change', function(){updateOrg4Options();update()});

}

function resetFilters() {
  document.getElementById('f-org3').value='';
  document.getElementById('f-org4').value='';
  document.getElementById('f-org5').value='';
  updateOrg4Options();
  update();
}

function getFiltered() {
  var org3=document.getElementById('f-org3').value;
  var org4=document.getElementById('f-org4').value;
  var org5=document.getElementById('f-org5').value;
  return DATA.filter(function(d){return (!org3||d.org3===org3)&&(!org4||d.org4===org4)&&(!org5||d.org5===org5)});
}

function aggregate(data, key) {
  var map = {};
  data.forEach(function(d){
    var k = d[key] || '(未分配)';
    if (!map[k]) map[k] = {name:k, hc:0, regH:0, otH:0, lvH:0, regW:0, otW:0, lvW:0, hourlyCount:0, annualCount:0};
    map[k].hc += d.headcount;
    map[k].regH += d.regularH;
    map[k].otH += d.overtimeH;
    map[k].lvH += d.leaveH;
    map[k].regW += (d.regularW||0);
    map[k].otW += (d.overtimeW||0);
    map[k].lvW += (d.leaveW||0);
    if (d.payType === '时薪') map[k].hourlyCount++;
    else if (d.payType === '年薪') map[k].annualCount++;
  });
  return Object.values(map).sort(function(a,b){return b.hc-a.hc});
}

function fmt(v){return v.toLocaleString('zh-CN',{minimumFractionDigits:1,maximumFractionDigits:1})}
function fmtD(v){return '$'+v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
function pct(a,b){return b===0?'0.0':(a/b*100).toFixed(1)}

function update() {
  var data = getFiltered();
  updateCostKPIs(data);
  updateCostCharts(data);
  updateHoursKPIs(data);
  updateHoursCharts(data);
  updateTables(data);
}

function updateCostKPIs(data) {
  var hc=data.reduce(function(s,d){return s+d.headcount},0);
  var regW=data.reduce(function(s,d){return s+(d.regularW||0)},0);
  var otW=data.reduce(function(s,d){return s+(d.overtimeW||0)},0);
  var lvW=data.reduce(function(s,d){return s+(d.leaveW||0)},0);
  var totalW=regW+otW+lvW;
  var avgW=hc===0?0:totalW/hc;
  var otWR=totalW===0?0:(otW/totalW*100);
  var regH=data.reduce(function(s,d){return s+d.regularH},0);
  var otH=data.reduce(function(s,d){return s+d.overtimeH},0);
  var totalH=regH+otH+data.reduce(function(s,d){return s+d.leaveH},0);
  var unitCost=totalH===0?0:totalW/totalH;

  document.getElementById('kpiCost').innerHTML = 
    '<div class="kpi-card highlight"><div class="kpi-label">工资总额</div><div class="kpi-value" style="font-size:22px">'+fmtD(totalW)+'</div><div class="kpi-sub">人均 '+fmtD(avgW)+'</div></div>'+
    '<div class="kpi-card green"><div class="kpi-label">常规出勤工资</div><div class="kpi-value" style="font-size:22px">'+fmtD(regW)+'</div><div class="kpi-sub">占比 '+pct(regW,totalW)+'%</div></div>'+
    '<div class="kpi-card orange"><div class="kpi-label">加班工资</div><div class="kpi-value" style="font-size:22px">'+fmtD(otW)+'</div><div class="kpi-sub">占比 '+pct(otW,totalW)+'%</div></div>'+
    '<div class="kpi-card purple"><div class="kpi-label">有薪假工资</div><div class="kpi-value" style="font-size:22px">'+fmtD(lvW)+'</div><div class="kpi-sub">占比 '+pct(lvW,totalW)+'%</div></div>'+
    '<div class="kpi-card teal"><div class="kpi-label">单位工时成本</div><div class="kpi-value" style="font-size:22px">$'+unitCost.toFixed(2)+'</div><div class="kpi-sub">总工资/总工时</div></div>'+
    '<div class="kpi-card '+(otWR>20?'red':'')+'"><div class="kpi-label">加班工资占比</div><div class="kpi-value">'+otWR.toFixed(1)+'%</div><div class="kpi-sub">加班工资/总工资</div></div>';
}

function updateHoursKPIs(data) {
  var hc=data.reduce(function(s,d){return s+d.headcount},0);
  var regH=data.reduce(function(s,d){return s+d.regularH},0);
  var otH=data.reduce(function(s,d){return s+d.overtimeH},0);
  var lvH=data.reduce(function(s,d){return s+d.leaveH},0);
  var totalH=regH+otH+lvH;
  var otRate=totalH===0?0:(otH/totalH*100);
  var avgH=hc===0?0:totalH/hc;
  var otCount=data.filter(function(d){return d.overtimeH>0}).length;

  document.getElementById('kpiHours').innerHTML = 
    '<div class="kpi-card highlight"><div class="kpi-label">在册人数</div><div class="kpi-value">'+hc+'</div><div class="kpi-sub">含加班 '+otCount+' 人 ('+pct(otCount,hc)+'%)</div></div>'+
    '<div class="kpi-card"><div class="kpi-label">总工时</div><div class="kpi-value">'+fmt(totalH)+'</div><div class="kpi-sub">人均 '+fmt(avgH)+' h</div></div>'+
    '<div class="kpi-card green"><div class="kpi-label">常规出勤工时</div><div class="kpi-value">'+fmt(regH)+'</div><div class="kpi-sub">占比 '+pct(regH,totalH)+'%</div></div>'+
    '<div class="kpi-card orange"><div class="kpi-label">加班工时</div><div class="kpi-value">'+fmt(otH)+'</div><div class="kpi-sub">占比 '+pct(otH,totalH)+'%</div></div>'+
    '<div class="kpi-card purple"><div class="kpi-label">有薪假工时</div><div class="kpi-value">'+fmt(lvH)+'</div><div class="kpi-sub">占比 '+pct(lvH,totalH)+'%</div></div>'+
    '<div class="kpi-card '+(otRate>20?'red':'')+'"><div class="kpi-label">加班率</div><div class="kpi-value">'+otRate.toFixed(1)+'%</div><div class="kpi-sub">加班/总工时</div></div>';
}

function updateCostCharts(data) {
  var byOrg4 = aggregate(data, 'org4').sort(function(a,b){var ta=a.regW+a.otW+a.lvW,tb=b.regW+b.otW+b.lvW;return tb-ta});
  var costLabels = byOrg4.map(function(d){return d.name});

  // Chart 1: Cost total stacked bar + OT cost ratio line
  if (charts.costTotal) charts.costTotal.destroy();
  charts.costTotal = new Chart(document.getElementById('chartCostTotal'), {
    type:'bar',
    data:{
      labels:costLabels,
      datasets:[
        {label:'常规出勤工资',data:byOrg4.map(function(d){return +d.regW.toFixed(2)}),backgroundColor:'#34a853',borderRadius:2,yAxisID:'y',order:3},
        {label:'加班工资',data:byOrg4.map(function(d){return +d.otW.toFixed(2)}),backgroundColor:'#ea4335',borderRadius:2,yAxisID:'y',order:2},
        {label:'有薪假工资',data:byOrg4.map(function(d){return +d.lvW.toFixed(2)}),backgroundColor:'#a142f4',borderRadius:2,yAxisID:'y',order:1},
        {label:'加班工资占比 %',data:byOrg4.map(function(d){var t=d.regW+d.otW+d.lvW;return t>0?+(d.otW/t*100).toFixed(1):0}),type:'line',borderColor:'#ff6d01',backgroundColor:'rgba(255,109,1,.1)',pointBackgroundColor:'#ff6d01',pointRadius:4,pointHoverRadius:6,borderWidth:2.5,fill:false,yAxisID:'y1',tension:0.3,order:0}

function updateTables(data) {
  var by4 = aggregate(data,'org4');
  var h4 = '<thead><tr><th>四级组织</th><th class="num">人数</th><th class="num">工资总额</th><th class="num">人均工资</th><th class="num">加班工资占比</th><th class="num">总工时</th><th class="num">人均工时</th><th class="num">加班率</th></tr></thead><tbody>';
  by4.forEach(function(d){
    var t=d.regH+d.otH+d.lvH;var avg=d.hc>0?t/d.hc:0;var r=t>0?d.otH/t*100:0;
    var tw=d.regW+d.otW+d.lvW;var aw=d.hc>0?tw/d.hc:0;var owr=tw>0?d.otW/tw*100:0;
    var tag=r>25?'tag-high':r>15?'tag-mid':'tag-low';
    h4+='<tr><td>'+d.name+'</td><td class="num">'+d.hc+'</td><td class="num">'+fmtD(tw)+'</td><td class="num">'+fmtD(aw)+'</td><td class="num">'+owr.toFixed(1)+'%</td><td class="num">'+fmt(t)+'</td><td class="num">'+fmt(avg)+'</td><td class="num"><span class="tag '+tag+'">'+r.toFixed(1)+'%</span></td></tr>';
  });
  var tHc=by4.reduce(function(s,d){return s+d.hc},0);
  var tReg=by4.reduce(function(s,d){return s+d.regH},0),tOt=by4.reduce(function(s,d){return s+d.otH},0),tLv=by4.reduce(function(s,d){return s+d.lvH},0);
  var tAll=tReg+tOt+tLv;
  var tRegW=by4.reduce(function(s,d){return s+d.regW},0),tOtW=by4.reduce(function(s,d){return s+d.otW},0),tLvW=by4.reduce(function(s,d){return s+d.lvW},0);
  var tW=tRegW+tOtW+tLvW;
  h4+='<tr style="font-weight:600;background:#f8f9fa"><td>合计</td><td class="num">'+tHc+'</td><td class="num">'+fmtD(tW)+'</td><td class="num">'+(tHc>0?fmtD(tW/tHc):'-')+'</td><td class="num">'+(tW>0?(tOtW/tW*100).toFixed(1):'0')+'%</td><td class="num">'+fmt(tAll)+'</td><td class="num">'+(tHc>0?fmt(tAll/tHc):'-')+'</td><td class="num">'+(tAll>0?(tOt/tAll*100).toFixed(1):'0')+'%</td></tr>';
  h4+='</tbody>';
  document.getElementById('tblOrg4').innerHTML=h4;

  var by5=aggregate(data,'org5');
  var h5='<thead><tr><th>五级组织</th><th>所属四级</th><th class="num">人数</th><th class="num">工资总额</th><th class="num">人均工资</th><th class="num">加班工资占比</th><th class="num">总工时</th><th class="num">人均工时</th><th class="num">加班率</th></tr></thead><tbody>';
  by5.forEach(function(d){
    var parent=data.find(function(r){return (r.org5||'(未分配)')===d.name});
    var pName=parent?(parent.org4||'-'):'-';
    var t=d.regH+d.otH+d.lvH;var avg=d.hc>0?t/d.hc:0;var r=t>0?d.otH/t*100:0;
    var tw=d.regW+d.otW+d.lvW;var aw=d.hc>0?tw/d.hc:0;var owr=tw>0?d.otW/tw*100:0;
    var tag=r>25?'tag-high':r>15?'tag-mid':'tag-low';
    h5+='<tr><td>'+d.name+'</td><td>'+pName+'</td><td class="num">'+d.hc+'</td><td class="num">'+fmtD(tw)+'</td><td class="num">'+fmtD(aw)+'</td><td class="num">'+owr.toFixed(1)+'%</td><td class="num">'+fmt(t)+'</td><td class="num">'+fmt(avg)+'</td><td class="num"><span class="tag '+tag+'">'+r.toFixed(1)+'%</span></td></tr>';
  });
  h5+='</tbody>';
  document.getElementById('tblOrg5').innerHTML=h5;

  var hd='<thead><tr><th>工号</th><th>姓名</th><th>公司</th><th>四级</th><th>五级</th><th>薪酬</th><th class="num">常规工时</th><th class="num">加班工时</th><th class="num">有薪假</th><th class="num">总工时</th><th class="num">常规工资</th><th class="num">加班工资</th><th class="num">有薪假工资</th><th class="num">总工资</th></tr></thead><tbody>';
  data.slice().sort(function(a,b){return ((b.regularW||0)+(b.overtimeW||0)+(b.leaveW||0))-((a.regularW||0)+(a.overtimeW||0)+(a.leaveW||0))}).forEach(function(d){
    var rateStr = d.payType==='年薪' ? '$'+Math.round(d.payRate).toLocaleString()+'/yr' : '$'+d.payRate+'/hr';
    hd+='<tr><td>'+d.empId+'</td><td>'+d.name+'</td><td>'+d.company+'</td><td>'+(d.org4||'-')+'</td><td>'+(d.org5||'-')+'</td><td>'+rateStr+'</td><td class="num">'+fmt(d.regularH)+'</td><td class="num">'+fmt(d.overtimeH)+'</td><td class="num">'+fmt(d.leaveH)+'</td><td class="num">'+fmt(d.regularH+d.overtimeH+d.leaveH)+'</td><td class="num">'+fmtD(d.regularW||0)+'</td><td class="num">'+fmtD(d.overtimeW||0)+'</td><td class="num">'+fmtD(d.leaveW||0)+'</td><td class="num">'+fmtD((d.regularW||0)+(d.overtimeW||0)+(d.leaveW||0))+'</td></tr>';
  });
  hd+='</tbody>';
  document.getElementById('tblDetail').innerHTML=hd;
}

function showDrillDown(orgName, orgKey) {
  var employees, label;
  if (orgKey === 'org4') {
    employees = DATA.filter(function(d){return (d.org4||'(未分配)')===orgName});
    label = '四级组织: ' + orgName;
  } else {
    employees = DATA.filter(function(d){return (d.org5||'(未分配)')===orgName});
    label = '五级组织: ' + orgName;
  }
  var hc = employees.length;
  var totalW = employees.reduce(function(s,d){return s+(d.regularW||0)+(d.overtimeW||0)+(d.leaveW||0)},0);
  document.getElementById('drillModalTitle').textContent = label + ' (' + hc + '名员工 · 工资总额 ' + fmtD(totalW) + ')';

  var hd = '<thead><tr><th>工号</th><th>姓名</th><th>公司</th><th>四级</th><th>五级</th><th>薪酬</th><th class="num">常规工时</th><th class="num">加班工时</th><th class="num">有薪假</th><th class="num">总工时</th><th class="num">常规工资</th><th class="num">加班工资</th><th class="num">总工资</th></tr></thead><tbody>';
  employees.sort(function(a,b){return ((b.regularW||0)+(b.overtimeW||0)+(b.leaveW||0))-((a.regularW||0)+(a.overtimeW||0)+(a.leaveW||0))}).forEach(function(d){
    var rateStr = d.payType==='年薪' ? '$'+Math.round(d.payRate).toLocaleString()+'/yr' : '$'+d.payRate+'/hr';
    hd += '<tr><td>'+d.empId+'</td><td>'+d.name+'</td><td>'+d.company+'</td><td>'+(d.org4||'-')+'</td><td>'+(d.org5||'-')+'</td><td>'+rateStr+'</td><td class="num">'+fmt(d.regularH)+'</td><td class="num">'+fmt(d.overtimeH)+'</td><td class="num">'+fmt(d.leaveH)+'</td><td class="num">'+fmt(d.regularH+d.overtimeH+d.leaveH)+'</td><td class="num">'+fmtD(d.regularW||0)+'</td><td class="num">'+fmtD(d.overtimeW||0)+'</td><td class="num">'+fmtD((d.regularW||0)+(d.overtimeW||0)+(d.leaveW||0))+'</td></tr>';
  });
  hd += '</tbody>';
  document.getElementById('drillModalTable').innerHTML = hd;
  document.getElementById('drillModal').style.display = 'flex';
}

function closeDrillModal() {
  document.getElementById('drillModal').style.display = 'none';
}

document.getElementById('drillModal').addEventListener('click', function(e) {
  if (e.target === this) closeDrillModal();
});

init();
</script>
