<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DO数字运营部 月度人力情况看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;color:#333;font-size:14px}
.header{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;padding:18px 28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.header h1{font-size:20px;font-weight:600;letter-spacing:1px}
.filters{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.filters label{font-size:12px;opacity:.85;display:block;margin-bottom:2px}
.filters select{padding:5px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);color:#fff;font-size:13px;cursor:pointer;min-width:130px}
.filters select option{color:#333;background:#fff}
.tabs{display:flex;gap:0;background:#fff;border-bottom:2px solid #e0e0e0;padding:0 28px}
.tab{padding:12px 24px;cursor:pointer;font-size:14px;font-weight:500;color:#666;border-bottom:3px solid transparent;transition:all .2s;user-select:none}
.tab:hover{color:#1a237e}
.tab.active{color:#1a237e;border-bottom-color:#1a237e;font-weight:600}
.content{padding:20px 28px;max-width:1400px;margin:0 auto}
.tab-panel{display:none}
.tab-panel.active{display:block}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:22px}
.kpi{background:#fff;border-radius:10px;padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.kpi-label{font-size:12px;color:#888;margin-bottom:6px}
.kpi-value{font-size:26px;font-weight:700;color:#1a237e}
.kpi-value.green{color:#2e7d32}
.kpi-value.orange{color:#e65100}
.kpi-value.red{color:#c62828}
.kpi-sub{font-size:11px;color:#999;margin-top:4px}
.chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(420px,1fr));gap:16px;margin-bottom:20px}
.chart-card{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.chart-card h3{font-size:14px;font-weight:600;color:#333;margin-bottom:10px}
.chart-wrap{position:relative;height:300px}
.chart-wrap.short{height:260px}
.chart-full{grid-column:1/-1}
.footer{text-align:center;padding:16px;font-size:11px;color:#aaa}
.note{background:#fff3e0;border-left:4px solid #ff9800;padding:10px 16px;border-radius:4px;margin-bottom:16px;font-size:12px;color:#6d4c00}
@media(max-width:900px){.chart-grid{grid-template-columns:1fr}.header{padding:14px 16px}.content{padding:14px 16px}}
</style>
</head>
<body>

<div class="header">
  <h1>DO 数字运营部 &middot; 月度人力情况看板</h1>
  <div class="filters">
    <div><label>月份</label><select id="selMonth"></select></div>
    <div><label>四级部门</label><select id="selDept"><option value="">全部</option></select></div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="tab1">人员动态</div>
  <div class="tab" data-tab="tab2">考勤情况</div>
  <div class="tab" data-tab="tab3">绩效考核</div>
</div>

<div class="content">

<div id="tab1" class="tab-panel active">
  <div class="kpi-row" id="kpi1"></div>
  <div class="chart-grid">
    <div class="chart-card"><h3>各四级部门人数分布</h3><div class="chart-wrap"><canvas id="c1dept"></canvas></div></div>
    <div class="chart-card"><h3>人员状态构成</h3><div class="chart-wrap"><canvas id="c1status"></canvas></div></div>
    <div class="chart-card chart-full"><h3>入职趋势（按月）</h3><div class="chart-wrap"><canvas id="c1hire"></canvas></div></div>
    <div class="chart-card"><h3>司龄分布</h3><div class="chart-wrap short"><canvas id="c1tenure"></canvas></div></div>
    <div class="chart-card"><h3>年龄分布</h3><div class="chart-wrap short"><canvas id="c1age"></canvas></div></div>
  </div>
</div>

<div id="tab2" class="tab-panel">
  <div class="note">考勤数据当前仅有 2026年5月，后续月份数据导入后将自动更新。</div>
  <div class="kpi-row" id="kpi2"></div>
  <div class="chart-grid">
    <div class="chart-card"><h3>各四级部门出勤率</h3><div class="chart-wrap"><canvas id="c2attend"></canvas></div></div>
    <div class="chart-card"><h3>各四级部门加班工时</h3><div class="chart-wrap"><canvas id="c2ot"></canvas></div></div>
    <div class="chart-card"><h3>加班类型构成</h3><div class="chart-wrap"><canvas id="c2ottype"></canvas></div></div>
    <div class="chart-card"><h3>请假类型分布</h3><div class="chart-wrap"><canvas id="c2leave"></canvas></div></div>
    <div class="chart-card chart-full"><h3>各四级部门迟到次数</h3><div class="chart-wrap short"><canvas id="c2late"></canvas></div></div>
  </div>
</div>

<div id="tab3" class="tab-panel">
  <div class="note">绩效数据当前仅有 2026年5月考核，后续周期数据导入后将自动更新。</div>
  <div class="kpi-row" id="kpi3"></div>
  <div class="chart-grid">
    <div class="chart-card"><h3>绩效等级分布</h3><div class="chart-wrap"><canvas id="c3grade"></canvas></div></div>
    <div class="chart-card"><h3>绩效分数分布</h3><div class="chart-wrap"><canvas id="c3score"></canvas></div></div>
    <div class="chart-card chart-full"><h3>各四级部门绩效等级分布</h3><div class="chart-wrap"><canvas id="c3deptGrade"></canvas></div></div>
    <div class="chart-card chart-full"><h3>各四级部门平均绩效分</h3><div class="chart-wrap short"><canvas id="c3deptAvg"></canvas></div></div>
  </div>
</div>

</div>

<div class="footer">DO数字运营部 月度人力情况看板 &middot; 数据截至 2026年6月</div>

    var monthMap={'一月':'01','二月':'02','三月':'03','四月':'04','五月':'05','六月':'06','七月':'07','八月':'08','九月':'09','十月':'10','十一月':'11','十二月':'12'};

    if(month.indexOf('-')>-1){targetNum=month.split('-')[1]}
    else if(month.indexOf('/')>-1){targetNum=month.split('/')[1]}
    else{targetNum=monthMap[month]||month}
    data=data.filter(function(r){var pNum=monthMap[r[1]]||r[1];return pNum===targetNum});
  }
  if(d4)data=data.filter(function(r){return r[3]===d4});
  return data;
}

document.querySelectorAll('.tab').forEach(function(t){
  t.addEventListener('click',function(){
    document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active')});
    document.querySelectorAll('.tab-panel').forEach(function(x){x.classList.remove('active')});
    t.classList.add('active');
    document.getElementById(t.dataset.tab).classList.add('active');
  });
});

function update(){
  var month=document.getElementById('selMonth').value;
  var d4=document.getElementById('selDept').value;
  updateTab1(month,d4);updateTab2(month,d4);updateTab3(month,d4);
}

function updateTab1(month,d4){
  var allRoster=DATA.R;
  if(d4)allRoster=allRoster.filter(function(r){return r[2]===d4});
  var active=allRoster;
  if(month){active=active.filter(function(r){if(!r[4])return true;return r[4]<=month})}
  var total=active.length;
  var trial=active.filter(function(r){return r[1]==='试用'}).length;
  var formal=total-trial;
  var hired=0,confirmed=0;
  allRoster.forEach(function(r){
    if(month&&r[4]===month)hired++;
    if(month&&r[5]===month)confirmed++;
  });
  if(!month){hired=allRoster.length;confirmed=allRoster.filter(function(r){return r[5]}).length}

  var mLabel=month?(month.indexOf('-')>-1?month.split('-').join('年').replace(/年(\d+)$/,'年$1月')+'':month):'全部';

  document.getElementById('kpi1').innerHTML=
    '<div class="kpi"><div class="kpi-label">在职人数</div><div class="kpi-value">'+total+'</div><div class="kpi-sub">正式 '+formal+' · 试用 '+trial+'</div></div>'+
    '<div class="kpi"><div class="kpi-label">入职人数</div><div class="kpi-value green">'+hired+'</div><div class="kpi-sub">'+mLabel+'</div></div>'+
    '<div class="kpi"><div class="kpi-label">转正人数</div><div class="kpi-value green">'+confirmed+'</div><div class="kpi-sub">'+mLabel+'</div></div>'+
    '<div class="kpi"><div class="kpi-label">试用占比</div><div class="kpi-value orange">'+fmtPct(total>0?trial/total*100:0)+'</div></div>';

  var byDept={};
  active.forEach(function(r){var d=r[2]||'(未分配)';byDept[d]=(byDept[d]||0)+1});
  var deptNames=Object.keys(byDept).sort(function(a,b){return byDept[b]-byDept[a]});
  destroy('c1dept');
  charts.c1dept=new Chart(document.getElementById('c1dept'),{type:'bar',data:{labels:deptNames,datasets:[{label:'人数',data:deptNames.map(function(d){return byDept[d]}),backgroundColor:'#3949ab',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}});

  destroy('c1status');
  charts.c1status=new Chart(document.getElementById('c1status'),{type:'doughnut',data:{labels:['正式','试用'],datasets:[{data:[formal,trial],backgroundColor:['#3949ab','#ff9800'],borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}}}});

  var hireMonths={};
  active.forEach(function(r){if(r[4])hireMonths[r[4]]=(hireMonths[r[4]]||0)+1});
  var hireLabels=Object.keys(hireMonths).sort();
  if(hireLabels.length>24)hireLabels=hireLabels.slice(-24);
  var hireData=hireLabels.map(function(m){return hireMonths[m]});
  var hireDisplay=hireLabels.map(function(m){var p=m.split('-');return p[0].slice(2)+'/'+p[1]});
  destroy('c1hire');
  charts.c1hire=new Chart(document.getElementById('c1hire'),{type:'bar',data:{labels:hireDisplay,datasets:[{label:'入职人数',data:hireData,backgroundColor:'#42a5f5',borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}});

  var tenureBuckets={'<1年':0,'1-2年':0,'2-3年':0,'3-5年':0,'5年以上':0};
  active.forEach(function(r){var t=r[8];if(t<1)tenureBuckets['<1年']++;else if(t<2)tenureBuckets['1-2年']++;else if(t<3)tenureBuckets['2-3年']++;else if(t<5)tenureBuckets['3-5年']++;else tenureBuckets['5年以上']++});
  destroy('c1tenure');
  charts.c1tenure=new Chart(document.getElementById('c1tenure'),{type:'bar',data:{labels:Object.keys(tenureBuckets),datasets:[{label:'人数',data:Object.values(tenureBuckets),backgroundColor:['#ef5350','#ff9800','#ffca28','#66bb6a','#42a5f5'],borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}});

  var ageBuckets={'<25':0,'25-30':0,'30-35':0,'35-40':0,'40+':0};
  active.forEach(function(r){var a=r[7];if(!a)return;if(a<25)ageBuckets['<25']++;else if(a<30)ageBuckets['25-30']++;else if(a<35)ageBuckets['30-35']++;else if(a<40)ageBuckets['35-40']++;else ageBuckets['40+']++});
  destroy('c1age');
  charts.c1age=new Chart(document.getElementById('c1age'),{type:'bar',data:{labels:Object.keys(ageBuckets),datasets:[{label:'人数',data:Object.values(ageBuckets),backgroundColor:['#ce93d8','#7986cb','#4db6ac','#ffb74d','#e57373'],borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}});
}

function updateTab2(month,d4){
  var data=getMonthlyFiltered(month,d4);
  var n=data.length;
  var totalTarget=0,totalActual=0,totalLate=0,totalOT=0,totalLeave=0;
  data.forEach(function(r){totalTarget+=r[3];totalActual+=r[4];totalLate+=r[5];totalOT+=r[6];totalLeave+=r[15]});
  var attendRate=totalTarget>0?(totalActual/totalTarget*100):0;

  document.getElementById('kpi2').innerHTML=
    '<div class="kpi"><div class="kpi-label">考勤人数</div><div class="kpi-value">'+n+'</div></div>'+
    '<div class="kpi"><div class="kpi-label">出勤率</div><div class="kpi-value'+(attendRate>=95?' green':' orange')+'">'+fmtPct(attendRate)+'</div><div class="kpi-sub">实际 '+fmt(totalActual)+' / 应出勤 '+fmt(totalTarget)+'</div></div>'+
    '<div class="kpi"><div class="kpi-label">加班总时长</div><div class="kpi-value orange">'+fmt(totalOT)+'</div><div class="kpi-sub">小时（加班费）</div></div>'+
    '<div class="kpi"><div class="kpi-label">迟到总次数</div><div class="kpi-value'+(totalLate>50?' red':'')+'">'+totalLate+'</div><div class="kpi-sub">人均 '+fmt(n>0?totalLate/n:0)+' 次</div></div>'+
    '<div class="kpi"><div class="kpi-label">请假总天数</div><div class="kpi-value">'+fmt(totalLeave)+'</div><div class="kpi-sub">人均 '+fmt(n>0?totalLeave/n:0)+' 天</div></div>';

  var byD4={};
  data.forEach(function(r){
    var d=r[2]||'(未分配)';
    if(!byD4[d])byD4[d]={n:0,target:0,actual:0,late:0,ot:0,otWd:0,otWe:0,otHol:0};
    var g=byD4[d];g.n++;g.target+=r[3];g.actual+=r[4];g.late+=r[5];g.ot+=r[6];g.otWd+=r[7];g.otWe+=r[8];g.otHol+=r[9];
  });
  var deptNames=Object.keys(byD4).sort(function(a,b){return byD4[b].n-byD4[a].n});

  destroy('c2attend');
  charts.c2attend=new Chart(document.getElementById('c2attend'),{type:'bar',data:{labels:deptNames,datasets:[{label:'出勤率(%)',data:deptNames.map(function(d){var g=byD4[d];return g.target>0?+(g.actual/g.target*100).toFixed(1):0}),backgroundColor:'#42a5f5',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:80,max:100,ticks:{callback:function(v){return v+'%'}}}}}});

  destroy('c2ot');
  charts.c2ot=new Chart(document.getElementById('c2ot'),{type:'bar',data:{labels:deptNames,datasets:[{label:'加班时长(h)',data:deptNames.map(function(d){return +byD4[d].ot.toFixed(1)}),backgroundColor:'#ef5350',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});

  var otWd=0,otWe=0,otHol=0;
  data.forEach(function(r){otWd+=r[7];otWe+=r[8];otHol+=r[9]});
  destroy('c2ottype');
  charts.c2ottype=new Chart(document.getElementById('c2ottype'),{type:'doughnut',data:{labels:['工作日加班','公休日加班','节假日加班'],datasets:[{data:[+otWd.toFixed(1),+otWe.toFixed(1),+otHol.toFixed(1)],backgroundColor:['#42a5f5','#ff9800','#ef5350'],borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}}}});

  var lvAnnual=0,lvCasual=0,lvSick=0,lvAdjust=0;
  data.forEach(function(r){lvAnnual+=r[11];lvCasual+=r[12];lvSick+=r[13];lvAdjust+=r[14]});
  destroy('c2leave');
  charts.c2leave=new Chart(document.getElementById('c2leave'),{type:'doughnut',data:{labels:['年假','事假','病假','调休假'],datasets:[{data:[+lvAnnual.toFixed(1),+lvCasual.toFixed(1),+lvSick.toFixed(1),+lvAdjust.toFixed(1)],backgroundColor:['#66bb6a','#ffa726','#ef5350','#ab47bc'],borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}}}});

  destroy('c2late');
  charts.c2late=new Chart(document.getElementById('c2late'),{type:'bar',data:{labels:deptNames,datasets:[{label:'迟到次数',data:deptNames.map(function(d){return byD4[d].late}),backgroundColor:'#ff9800',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}});
}

function updateTab3(month,d4){
  var data=getPerfFiltered(month,d4);
  var seen={};var unique=[];
  data.forEach(function(r){if(!seen[r[0]]){seen[r[0]]=true;unique.push(r)}});
  data=unique;
  var n=data.length;
  var scores=data.filter(function(r){return r[4]!==null}).map(function(r){return r[4]});
  var avgScore=scores.length>0?scores.reduce(function(a,b){return a+b},0)/scores.length:0;
  var grades={};
  data.forEach(function(r){if(r[5])grades[r[5]]=(grades[r[5]]||0)+1});
  var exceed=grades['超出预期']||0;
  var meetMinus=grades['符合预期-']||0;

  document.getElementById('kpi3').innerHTML=
    '<div class="kpi"><div class="kpi-label">考核人数</div><div class="kpi-value">'+n+'</div></div>'+
    '<div class="kpi"><div class="kpi-label">平均绩效分</div><div class="kpi-value">'+avgScore.toFixed(2)+'</div><div class="kpi-sub">满分 4.0</div></div>'+
    '<div class="kpi"><div class="kpi-label">超出预期</div><div class="kpi-value green">'+exceed+'</div><div class="kpi-sub">占比 '+fmtPct(n>0?exceed/n*100:0)+'</div></div>'+
    '<div class="kpi"><div class="kpi-label">符合预期-</div><div class="kpi-value orange">'+meetMinus+'</div><div class="kpi-sub">占比 '+fmtPct(n>0?meetMinus/n*100:0)+'</div></div>';

  var gradeLabels=['超出预期','符合预期+','符合预期','符合预期-'];
  var gradeColors=['#2e7d32','#66bb6a','#42a5f5','#ff9800'];
  destroy('c3grade');
  charts.c3grade=new Chart(document.getElementById('c3grade'),{type:'doughnut',data:{labels:gradeLabels,datasets:[{data:gradeLabels.map(function(g){return grades[g]||0}),backgroundColor:gradeColors,borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}}}});

  var bins={'2.0-2.5':0,'2.5-3.0':0,'3.0-3.5':0,'3.5-4.0':0};
  scores.forEach(function(s){if(s<2.5)bins['2.0-2.5']++;else if(s<3.0)bins['2.5-3.0']++;else if(s<3.5)bins['3.0-3.5']++;else bins['3.5-4.0']++});
  destroy('c3score');
  charts.c3score=new Chart(document.getElementById('c3score'),{type:'bar',data:{labels:Object.keys(bins),datasets:[{label:'人数',data:Object.values(bins),backgroundColor:['#ef5350','#ff9800','#42a5f5','#66bb6a'],borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}});

  var byD4={};
  data.forEach(function(r){
    var d=r[3]||'(未分配)';
    if(!byD4[d])byD4[d]={exceed:0,meetP:0,meet:0,meetM:0,n:0,totalScore:0};
    var g=byD4[d];g.n++;
    if(r[4]!==null)g.totalScore+=r[4];
    var gr=r[5];
    if(gr==='超出预期')g.exceed++;
    else if(gr==='符合预期+')g.meetP++;
    else if(gr==='符合预期')g.meet++;
    else if(gr==='符合预期-')g.meetM++;
  });
  var deptNames=Object.keys(byD4).sort(function(a,b){return byD4[b].n-byD4[a].n});

  destroy('c3deptGrade');
  charts.c3deptGrade=new Chart(document.getElementById('c3deptGrade'),{type:'bar',data:{labels:deptNames,datasets:[{label:'超出预期',data:deptNames.map(function(d){return byD4[d].exceed}),backgroundColor:'#2e7d32'},{label:'符合预期+',data:deptNames.map(function(d){return byD4[d].meetP}),backgroundColor:'#66bb6a'},{label:'符合预期',data:deptNames.map(function(d){return byD4[d].meet}),backgroundColor:'#42a5f5'},{label:'符合预期-',data:deptNames.map(function(d){return byD4[d].meetM}),backgroundColor:'#ff9800'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{boxWidth:12,font:{size:11}}}},scales:{x:{stacked:true},y:{stacked:true,beginAtZero:true,ticks:{stepSize:1}}}}});

  destroy('c3deptAvg');
  charts.c3deptAvg=new Chart(document.getElementById('c3deptAvg'),{type:'bar',data:{labels:deptNames,datasets:[{label:'平均分',data:deptNames.map(function(d){var g=byD4[d];return g.n>0?+(g.totalScore/g.n).toFixed(2):0}),backgroundColor:'#3949ab',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:2.5,max:4.0,ticks:{stepSize:0.25}}}}});
}

document.getElementById('selMonth').addEventListener('change',update);
document.getElementById('selDept').addEventListener('change',update);
initFilters();
update();

</script>
