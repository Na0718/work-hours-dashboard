<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DO数字运营部月度人力情况看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;background:#f5f6fa;color:#2d3436;min-height:100vh}
.header{background:linear-gradient(135deg,#2c3e50 0%,#34495e 50%,#4a6fa5 100%);color:#fff;padding:16px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;box-shadow:0 2px 12px rgba(0,0,0,.12)}
.header h1{font-size:20px;font-weight:600;letter-spacing:.5px}
.filters{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.filters label{font-size:12px;opacity:.8}
.filters select{padding:5px 12px;border:none;border-radius:6px;font-size:12px;background:rgba(255,255,255,.15);color:#fff;outline:none;cursor:pointer;min-width:120px;backdrop-filter:blur(4px)}
.filters select option{color:#333;background:#fff}
.tab-bar{display:flex;background:#fff;border-bottom:1px solid #e2e8f0;padding:0 24px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.tab-btn{padding:12px 24px;font-size:14px;font-weight:500;cursor:pointer;border:none;background:none;color:#94a3b8;position:relative;transition:all .2s}
.tab-btn.active{color:#2c3e50;font-weight:600}
.tab-btn.active::after{content:'';position:absolute;bottom:-1px;left:8px;right:8px;height:2.5px;background:linear-gradient(90deg,#4a6fa5,#6c8ebf);border-radius:2px 2px 0 0}
.tab-btn:hover{color:#2c3e50}
.tab-panel{display:none;padding:16px 24px;max-width:1280px;margin:0 auto}
.tab-panel.active{display:block}
.summary-box{background:linear-gradient(135deg,#f8fafc,#eef2ff);border-left:3px solid #4a6fa5;padding:14px 18px;font-size:13px;line-height:1.9;margin-bottom:14px;border-radius:0 8px 8px 0;color:#475569;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.summary-box b{font-weight:700;color:#1e293b}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:14px}
.kpi-card{background:#fff;border-radius:10px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.06);text-align:center;border:1px solid #f1f5f9;transition:box-shadow .2s}
.kpi-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
.kpi-card .label{font-size:12px;color:#94a3b8;margin-bottom:4px;font-weight:500}
.kpi-card .value{font-size:24px;font-weight:700;color:#2c3e50;line-height:1.2}
.kpi-card .sub{font-size:11px;color:#94a3b8;margin-top:3px}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.chart-card{background:#fff;border-radius:10px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid #f1f5f9}
.chart-card.full{grid-column:1/-1}
.chart-card h3{font-size:13px;font-weight:600;color:#475569;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:6px}
.chart-card h3::before{content:'';display:inline-block;width:3px;height:14px;background:linear-gradient(180deg,#4a6fa5,#6c8ebf);border-radius:2px}
.chart-card canvas{width:100%!important}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.5);z-index:9999;justify-content:center;align-items:center;backdrop-filter:blur(2px)}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:14px;padding:24px;max-width:780px;width:92%;max-height:78vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);position:relative}
.modal-box .close-btn{position:absolute;top:10px;right:14px;font-size:20px;cursor:pointer;color:#94a3b8;background:none;border:none;line-height:1;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-box .close-btn:hover{color:#334155;background:#f1f5f9}
.modal-box h3{font-size:15px;font-weight:700;margin-bottom:14px;color:#2c3e50}
.modal-table{width:100%;border-collapse:collapse;font-size:12px}
.modal-table th{background:#f8fafc;padding:8px 10px;text-align:left;font-weight:600;border-bottom:2px solid #e2e8f0;color:#475569}
.modal-table td{padding:6px 10px;border-bottom:1px solid #f1f5f9}
.modal-table tr:hover td{background:#f8fafc}
.health-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px}
.health-table th{background:#f8fafc;padding:8px 10px;text-align:left;font-weight:600;border-bottom:2px solid #e2e8f0;color:#475569;white-space:nowrap}
.health-table td{padding:7px 10px;border-bottom:1px solid #f1f5f9}
.health-table tr:hover td{background:#f8fafc}
.health-note{font-size:11px;color:#64748b;line-height:1.6;padding:10px 14px;margin-top:8px;background:#f8fafc;border-radius:6px;border:1px solid #e2e8f0}
.health-note b{color:#334155}
.health-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-green{background:#dcfce7;color:#166534}
.badge-yellow{background:#fef3c7;color:#92400e}
.badge-red{background:#fee2e2;color:#991b1b}
.badge-gray{background:#f1f5f9;color:#64748b}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px;vertical-align:middle}
.dot-green{background:#22c55e}
.dot-yellow{background:#f59e0b}
.dot-red{background:#ef4444}
.dot-gray{background:#cbd5e1}
.new-hire-section{margin-top:12px}
.new-hire-section h4{font-size:13px;font-weight:600;margin-bottom:8px;color:#475569}
.nh-table{width:100%;border-collapse:collapse;font-size:11px}
.nh-table th{background:#f0f4ff;padding:6px 8px;text-align:left;font-weight:600;border-bottom:2px solid #dbe6f0;color:#475569}
.nh-table td{padding:5px 8px;border-bottom:1px solid #f1f5f9}
@media(max-width:900px){.chart-grid{grid-template-columns:1fr}.kpi-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div class="header">
  <h1>DO数字运营部 月度人力情况看板</h1>
  <div class="filters">
    <label>月份</label><select id="selMonth"></select>
    <label>部门</label><select id="selDept"><option value="全部">全部部门</option></select>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="tab1">人员动态</button>
  <button class="tab-btn" data-tab="tab2">考勤情况</button>
  <button class="tab-btn" data-tab="tab3">绩效考核</button>
  <button class="tab-btn" data-tab="tab4">离职预警</button>
</div>

<div id="tab1" class="tab-panel active">
  <div class="summary-box" id="sum1"></div>
  <div class="kpi-row" id="kpi1"></div>
  <div class="chart-grid">
    <div class="chart-card full"><h3>入职/离职/净增减趋势（1月-6月）</h3><canvas id="c1_trend" height="65"></canvas></div>
    <div class="chart-card"><h3>司龄分布</h3><canvas id="c1_tenure" height="120"></canvas></div>
    <div class="chart-card"><h3>离职原因分析</h3><canvas id="c1_reason" height="120"></canvas></div>
  </div>
</div>

<div id="tab2" class="tab-panel">
  <div class="summary-box" id="sum2"></div>
  <div class="kpi-row" id="kpi2"></div>
  <div class="chart-grid">
    <div class="chart-card"><h3>各四级部门加班工时</h3><canvas id="c2_ot" height="120"></canvas></div>
    <div class="chart-card full"><h3>加班集中度分析（各部门Top5）</h3><canvas id="c2_otfocus" height="75"></canvas></div>
    <div class="chart-card"><h3>各四级部门迟到次数</h3><canvas id="c2_late" height="120"></canvas></div>
  </div>
</div>

<div id="tab3" class="tab-panel">
  <div class="summary-box" id="sum3"></div>
  <div class="kpi-row" id="kpi3"></div>
  <div class="chart-grid">
    <div class="chart-card"><h3>绩效等级分布</h3><canvas id="c3_grade" height="120"></canvas></div>
    <div class="chart-card full"><h3>各四级部门绩效等级分布</h3><canvas id="c3_deptgrade" height="80"></canvas></div>
    <div class="chart-card full"><h3>绩效分布健康度</h3><div id="healthTbl"></div></div>
    <div class="chart-card full"><h3>新入职人员绩效</h3><canvas id="c3_newhire" height="70"></canvas><div id="newhireTbl" class="new-hire-section"></div></div>
  </div>
</div>

<div id="tab4" class="tab-panel">
  <div class="summary-box" id="sum4"></div>
  <div class="kpi-row" id="kpi4"></div>
  <div class="chart-grid">
    <div class="chart-card"><h3>离职原因分布</h3><canvas id="c4_reason" height="120"></canvas></div>
    <div class="chart-card"><h3>离职类型分布</h3><canvas id="c4_type" height="120"></canvas></div>
    <div class="chart-card"><h3>各月离职趋势</h3><canvas id="c4_trend" height="120"></canvas></div>
    <div class="chart-card"><h3>各四级部门离职人数</h3><canvas id="c4_dept" height="120"></canvas></div>
    <div class="chart-card full"><h3>离职人员明细表</h3><div id="leaveTbl"></div></div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <button class="close-btn" onclick="closeModal()">&times;</button>
    <h3 id="modalTitle"></h3>
    <div id="modalBody"></div>
  </div>
</div>

  document.getElementById('modal').classList.add('show');
}

function buildTable(headers,rows){
  var h='<table class="modal-table"><thead><tr>';
  headers.forEach(function(x){h+='<th>'+x+'</th>'});
  h+='</tr></thead><tbody>';
  rows.forEach(function(r){h+='<tr>';r.forEach(function(c){h+='<td>'+(c==null?'-':c)+'</td>'});h+='</tr>'});
  h+='</tbody></table>';
  if(rows.length===0) h+='<p style="color:#999;text-align:center;padding:20px">暂无数据</p>';
  return h;
}

function filterDept(list,d4Idx){var d=curDept();if(d==='全部')return list;return list.filter(function(r){return r[d4Idx]===d})}
function filterMonth_M(list){var m=curMonth();return list.filter(function(r){return r[1]===m})}
function filterMonth_P(list){var p=monthToPeriod(curMonth());return list.filter(function(r){return r[1]===p})}
function hireMonth(m){return DATA.R.filter(function(r){return r[4]===m})}
function leaveMonth(m){return DATA.R.filter(function(r){return r[5]===m})}
function hireMonthDept(m){var d=curDept();var h=hireMonth(m);if(d==='全部')return h;return h.filter(function(r){return r[2]===d})}
function leaveMonthDept(m){var d=curDept();var l=leaveMonth(m);if(d==='全部')return l;return l.filter(function(r){return r[2]===d})}

function kpiCard(label,value,sub){return'<div class="kpi-card"><div class="label">'+label+'</div><div class="value">'+value+'</div><div class="sub">'+sub+'</div></div>'}

/* ===== TAB 1: 人员动态 ===== */
function renderTab1(){
  var d=curDept(), m=curMonth();
  var active=activeEmps();
  if(d!=='全部') active=active.filter(function(r){return r[2]===d});
  var hires=hireMonthDept(m);
  var leaves=leaveMonthDept(m);
  var net=hires.length-leaves.length;

  // Summary
  var totalHires=0,totalLeaves=0;
  DATA.mM.forEach(function(mm){totalHires+=hireMonthDept(mm).length;totalLeaves+=leaveMonthDept(mm).length});
  var leaveByDept={};
  var allLeaves=DATA.R.filter(function(r){return r[5]!==''});
  if(d!=='全部') allLeaves=allLeaves.filter(function(r){return r[2]===d});
  allLeaves.forEach(function(r){leaveByDept[r[2]]=(leaveByDept[r[2]]||0)+1});
  var sortedDepts=Object.keys(leaveByDept).sort(function(a,b){return leaveByDept[b]-leaveByDept[a]});
  var leaveDeptText='';
  if(sortedDepts.length>0){
    leaveDeptText='离职主要集中在';
    sortedDepts.slice(0,2).forEach(function(dep,i){
      var color=dep==='交付组'?'#ef4444':dep==='美国技术支持组'?'#f59e0b':'#4a6fa5';
      leaveDeptText+=(i>0?'和':'')+'<b style="color:'+color+'">'+dep+'('+leaveByDept[dep]+'人)</b>';
    });
    leaveDeptText+='。';
  }
  document.getElementById('sum1').innerHTML='本月入职<b>'+hires.length+'人</b>，离职<b>'+leaves.length+'人</b>，净增<b style="color:'+(net>=0?'#22c55e':'#ef4444')+'">'+(net>=0?'+':'')+net+'人</b>。上半年累计入职<b>'+totalHires+'人</b>，离职<b>'+totalLeaves+'人</b>。'+leaveDeptText;

  // KPIs
  document.getElementById('kpi1').innerHTML=
    kpiCard('在职人数',active.length,'人')+
    kpiCard('本月入职',hires.length,'人')+
    kpiCard('本月离职',leaves.length,'人')+
    kpiCard('净增减',(net>=0?'+':'')+net,'人');

  // Trend chart
  dc('c1_trend');
  var trendLabels=[],hireData=[],leaveData=[],netData=[];
  DATA.mM.forEach(function(mm){
    trendLabels.push(mm.replace('2026-','')+'月');
    var h=hireMonthDept(mm).length,l=leaveMonthDept(mm).length;
    hireData.push(h);leaveData.push(l);netData.push(h-l);
  });
  charts['c1_trend']=new Chart(document.getElementById('c1_trend'),{
    type:'bar',
    data:{labels:trendLabels,datasets:[
      {label:'入职',data:hireData,backgroundColor:'#22c55e',order:2},
      {label:'离职',data:leaveData,backgroundColor:'#ef4444',order:2},
      {label:'净增减',data:netData,type:'line',borderColor:'#4a6fa5',backgroundColor:'rgba(26,35,126,.1)',fill:true,tension:.3,order:1}
    ]},
    options:{responsive:true,plugins:{legend:{position:'top'}},scales:{y:{beginAtZero:true}},
      onClick:function(evt,els){
        if(!els.length)return;
        var idx=els[0].index;var mm=DATA.mM[idx];
        var hList=hireMonthDept(mm),lList=leaveMonthDept(mm);
        var rows=[];
        hList.forEach(function(r){rows.push([empName(r[0]),r[0],'入职',r[2],r[3]||'-',r[4]]);});
        lList.forEach(function(r){rows.push([empName(r[0]),r[0],'离职',r[2],r[3]||'-',r[5]]);});
        showModal(mm+' 入离职明细',buildTable(['姓名','工号','类型','部门','小组','日期'],rows));
      }
    }
  });

  // Tenure distribution
  dc('c1_tenure');
  var tenureBuckets={'<3个月':0,'3-6个月':0,'6-12个月':0,'1-2年':0,'2年以上':0};
  var refDate=new Date(m+'-01');
  active.forEach(function(r){
    if(!r[4])return;
    var hd=new Date(r[4]+'-01');
    var months=(refDate-hd)/(30.44*24*3600*1000);
    if(months<3)tenureBuckets['<3个月']++;
    else if(months<6)tenureBuckets['3-6个月']++;
    else if(months<12)tenureBuckets['6-12个月']++;
    else if(months<24)tenureBuckets['1-2年']++;
    else tenureBuckets['2年以上']++;
  });
  var tLabels=Object.keys(tenureBuckets),tData=Object.values(tenureBuckets);
  charts['c1_tenure']=new Chart(document.getElementById('c1_tenure'),{
    type:'bar',
    data:{labels:tLabels,datasets:[{label:'人数',data:tData,backgroundColor:COLORS.slice(0,5)}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}},
      onClick:function(evt,els){
        if(!els.length)return;
        var bucket=tLabels[els[0].index];
        var emps=active.filter(function(r){
          if(!r[4])return false;
          var hd=new Date(r[4]+'-01');
          var months=(refDate-hd)/(30.44*24*3600*1000);
          if(bucket==='<3个月')return months<3;
          if(bucket==='3-6个月')return months>=3&&months<6;
          if(bucket==='6-12个月')return months>=6&&months<12;
          if(bucket==='1-2年')return months>=12&&months<24;
          return months>=24;
        });
        var rows=emps.map(function(r){return[empName(r[0]),r[0],r[1],r[2],r[4]]});
        showModal(bucket+' 司龄员工',buildTable(['姓名','工号','状态','部门','入职月份'],rows));
      }
    }
  });

  // Leave reasons
  dc('c1_reason');
  var reasonCounts={};
  var leavers=DATA.R.filter(function(r){return r[8]!==''});
  if(d!=='全部') leavers=leavers.filter(function(r){return r[2]===d});
  leavers.forEach(function(r){reasonCounts[r[8]]=(reasonCounts[r[8]]||0)+1});
  var rsLabels=Object.keys(reasonCounts),rsData=Object.values(reasonCounts);
  if(rsLabels.length===0){rsLabels=['暂无'];rsData=[0]}
  charts['c1_reason']=new Chart(document.getElementById('c1_reason'),{
    type:'bar',
    data:{labels:rsLabels,datasets:[{label:'人数',data:rsData,backgroundColor:'#ef4444cc'}]},
    options:{responsive:true,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{beginAtZero:true}},
      onClick:function(evt,els){
        if(!els.length)return;
        var reason=rsLabels[els[0].index];
        var emps=leavers.filter(function(r){return r[8]===reason});
        var rows=emps.map(function(r){return[empName(r[0]),r[0],r[2],r[5],r[7],r[8]]});
        showModal(reason+' 离职人员',buildTable(['姓名','工号','部门','离职月份','离职类型','离职原因'],rows));
      }
    }
  });
}

/* ===== TAB 2: 考勤情况 ===== */
/* M format: [empId, month, d4, actualDays, lateTimes, totalOT] */
function renderTab2(){
  var d=curDept(),m=curMonth();
  var mData=filterMonth_M(DATA.M);
  if(d!=='全部') mData=mData.filter(function(r){return r[2]===d});

  var totalPpl=mData.length;
  var totalLate=0,totalOT=0;
  mData.forEach(function(r){
    totalLate+=r[4]||0;totalOT+=r[5]||0;
  });

  var deptList=d==='全部'?DATA.d4:[d];
  var allM=filterMonth_M(DATA.M);

  // OT by dept
  var deptOT={};
  deptList.forEach(function(dep){
    var recs=allM.filter(function(r){return r[2]===dep});
    var s=0;recs.forEach(function(r){s+=r[5]||0});
    deptOT[dep]=s;
  });
  var topOTDept=Object.keys(deptOT).sort(function(a,b){return deptOT[b]-deptOT[a]})[0]||'-';
  var topOTHrs=deptOT[topOTDept]||0;

  // Late by dept
  var deptLate={};
  deptList.forEach(function(dep){
    var recs=allM.filter(function(r){return r[2]===dep});
    var s=0;recs.forEach(function(r){s+=r[4]||0});
    deptLate[dep]=s;
  });
  var topLateDept=Object.keys(deptLate).sort(function(a,b){return deptLate[b]-deptLate[a]})[0]||'-';
  var topLateCnt=deptLate[topLateDept]||0;

  // OT concentration per dept
  var otFocusData=[];
  deptList.forEach(function(dep){
    var recs=allM.filter(function(r){return r[2]===dep&&(r[5]||0)>0});
    recs.sort(function(a,b){return(b[5]||0)-(a[5]||0)});
    var top5=recs.slice(0,5);
    var total=0;recs.forEach(function(r){total+=r[5]||0});
    var top5sum=0;top5.forEach(function(r){top5sum+=r[5]||0});
    otFocusData.push({dep:dep,total:total,top5:top5sum,pct:total>0?((top5sum/total)*100).toFixed(1):0,
      top5names:top5.map(function(r){return r[0]+'('+r[5].toFixed(1)+'h)'}).join(', ')});
  });
  var highConcDept=otFocusData.filter(function(x){return parseFloat(x.pct)>70&&x.total>0});
  var concText='';
  if(highConcDept.length>0){
    concText='加班集中度较高的部门：<b style="color:#ef4444">'+highConcDept.map(function(x){return x.dep+'(Top5占比'+x.pct+'%)'}).join('、')+'</b>。';
  }

  document.getElementById('sum2').innerHTML='本月考勤<b>'+totalPpl+'人</b>，加班总时长<b style="color:#f59e0b">'+totalOT.toFixed(1)+'小时</b>，迟到总<b>'+totalLate+'次</b>。加班最多部门为<b style="color:#f59e0b">'+topOTDept+'('+topOTHrs.toFixed(1)+'h)</b>，迟到最多部门为<b style="color:#ef4444">'+topLateDept+'('+topLateCnt+'次)</b>。'+concText;

  // KPIs
  document.getElementById('kpi2').innerHTML=
    kpiCard('考勤人数',totalPpl,'人')+
    kpiCard('加班总时长',totalOT.toFixed(1),'小时')+
    kpiCard('迟到总次数',totalLate,'次');

  // Dept OT bar
  dc('c2_ot');
  var otLabels=[],otData=[];
  deptList.forEach(function(dep){
    otLabels.push(dep);
    var s=0;allM.filter(function(r){return r[2]===dep&&r[1]===m}).forEach(function(r){s+=r[5]||0});
    otData.push(s);
  });
  charts['c2_ot']=new Chart(document.getElementById('c2_ot'),{
    type:'bar',
    data:{labels:otLabels,datasets:[{label:'加班工时(h)',data:otData,backgroundColor:'#f59e0b'}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}},
      onClick:function(evt,els){
        if(!els.length)return;
        var dep=otLabels[els[0].index];
        var recs=allM.filter(function(r){return r[2]===dep&&r[1]===m&&(r[5]||0)>0});
        recs.sort(function(a,b){return(b[5]||0)-(a[5]||0)});
        var rows=recs.map(function(r){return[empName(r[0]),r[0],r[5].toFixed(1)]});
        showModal(dep+' '+m+' 加班明细',buildTable(['姓名','工号','加班总时长(h)'],rows));
      }
    }
  });

  // OT concentration - per dept top 5 grouped bar
  dc('c2_otfocus');
  var otFLabels=otFocusData.map(function(x){return x.dep});
  charts['c2_otfocus']=new Chart(document.getElementById('c2_otfocus'),{
    type:'bar',
    data:{labels:otFLabels,datasets:[
      {label:'部门总加班(h)',data:otFocusData.map(function(x){return x.total}),backgroundColor:'#dbe6f0'},
      {label:'Top5加班(h)',data:otFocusData.map(function(x){return x.top5}),backgroundColor:'#4a6fa5'}
    ]},
    options:{responsive:true,plugins:{legend:{position:'top'},tooltip:{callbacks:{afterBody:function(ctx){var i=ctx[0].dataIndex;return'Top5占比: '+otFocusData[i].pct+'%  ('+otFocusData[i].top5names+')'}}}},scales:{y:{beginAtZero:true}},
      onClick:function(evt,els){
        if(!els.length)return;
        var dep=otFLabels[els[0].index];
        var recs=allM.filter(function(r){return r[2]===dep&&r[1]===m&&(r[5]||0)>0});
        recs.sort(function(a,b){return(b[5]||0)-(a[5]||0)});
        var rows=recs.slice(0,10).map(function(r){return[empName(r[0]),r[0],r[5].toFixed(1)+'h']});
        showModal(dep+' '+m+' 加班Top10',buildTable(['姓名','工号','加班时长'],rows));
      }
    }
  });

  // Late by dept
  dc('c2_late');
  var lateLabels=[],lateData=[];
  deptList.forEach(function(dep){
    lateLabels.push(dep);
    var s=0;allM.filter(function(r){return r[2]===dep&&r[1]===m}).forEach(function(r){s+=r[4]||0});
    lateData.push(s);
  });
  charts['c2_late']=new Chart(document.getElementById('c2_late'),{
    type:'bar',
    data:{labels:lateLabels,datasets:[{label:'迟到次数',data:lateData,backgroundColor:'#ef4444'}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}},
      onClick:function(evt,els){
        if(!els.length)return;
        var dep=lateLabels[els[0].index];
        var recs=allM.filter(function(r){return r[2]===dep&&r[1]===m&&(r[4]||0)>0});
        var rows=recs.map(function(r){return[empName(r[0]),r[0],r[4]+'次']});
        showModal(dep+' '+m+' 迟到明细',buildTable(['姓名','工号','迟到次数'],rows));
      }
    }
  });
}

/* ===== TAB 3: 绩效考核 ===== */
function renderTab3(){
  var d=curDept(),m=curMonth(),p=monthToPeriod(m);
  var pData=DATA.P.filter(function(r){return r[1]===p});
  if(d!=='全部') pData=pData.filter(function(r){return r[3]===d});
  var finished=pData.filter(function(r){return r[7]==='已结束'});

  var exceed=finished.filter(function(r){return r[5]==='超出预期'}).length;
  var meetPlus=finished.filter(function(r){return r[5]==='符合预期+'}).length;
  var meet=finished.filter(function(r){return r[5]==='符合预期'}).length;
  var meetMinus=finished.filter(function(r){return r[5]==='符合预期-'}).length;
  var below=finished.filter(function(r){return r[5]==='低于预期'}).length;
  var exceedPct=finished.length>0?((exceed/finished.length)*100).toFixed(1):0;
  var belowPct=finished.length>0?((below/finished.length)*100).toFixed(1):0;
  var meetTotal=meetPlus+meet+meetMinus;

  // Summary - grade based, no scores
  var gradeOrder=['超出预期','符合预期+','符合预期','符合预期-','低于预期'];
  var deptList=d==='全部'?DATA.d4:[d];

  // Find dept with highest exceed% and dept with most below
  var bestDept='',worstDept='',bestExceedPct=0,worstBelowPct=0;
  deptList.forEach(function(dep){
    var recs=finished.filter(function(r){return r[3]===dep});
    if(recs.length<2)return;
    var exc=recs.filter(function(r){return r[5]==='超出预期'}).length;
    var bel=recs.filter(function(r){return r[5]==='低于预期'}).length;
    var excP=exc/recs.length;var belP=bel/recs.length;
    if(excP>bestExceedPct){bestExceedPct=excP;bestDept=dep}
    if(belP>worstBelowPct){worstBelowPct=belP;worstDept=dep}
  });

  var sumText='本月考核<b>'+finished.length+'人</b>（已结束）。超出预期<b style="color:#4a6fa5">'+exceed+'人('+exceedPct+'%)</b>，符合预期<b>'+meetTotal+'人</b>（其中符合预期+ '+meetPlus+'人，符合预期 '+meet+'人，符合预期- '+meetMinus+'人），低于预期<b style="color:#ef4444">'+below+'人('+belowPct+'%)</b>。';
  if(bestDept)sumText+='超出预期占比最高部门为<b style="color:#22c55e">'+bestDept+'('+(bestExceedPct*100).toFixed(1)+'%)</b>';
  if(worstDept&&worstDept!==bestDept&&worstBelowPct>0)sumText+='，低于预期占比最高部门为<b style="color:#ef4444">'+worstDept+'('+(worstBelowPct*100).toFixed(1)+'%)</b>';
  sumText+='。';
  document.getElementById('sum3').innerHTML=sumText;

  // KPIs - no score
  document.getElementById('kpi3').innerHTML=
    kpiCard('考核人数(已结束)',finished.length,'人')+
    kpiCard('超出预期',exceed+'人',exceedPct+'%')+
    kpiCard('符合预期',meetTotal+'人','含+/-'+(meetPlus+meetMinus)+'人')+
    kpiCard('低于预期',below+'人',belowPct+'%');

  // Grade doughnut
  dc('c3_grade');
  var gradeCounts={};
  gradeOrder.forEach(function(g){gradeCounts[g]=0});
  finished.forEach(function(r){if(r[5])gradeCounts[r[5]]=(gradeCounts[r[5]]||0)+1});
  var gLabels=gradeOrder.filter(function(g){return gradeCounts[g]>0});
  var gData=gLabels.map(function(g){return gradeCounts[g]});
  charts['c3_grade']=new Chart(document.getElementById('c3_grade'),{
    type:'doughnut',
    data:{labels:gLabels,datasets:[{data:gData,backgroundColor:['#4a6fa5','#6c8ebf','#8fabc7','#c8d8e8','#ef4444']}]},
    options:{responsive:true,plugins:{legend:{position:'bottom'}},
      onClick:function(evt,els){
        if(!els.length)return;
        var grade=gLabels[els[0].index];
        var recs=finished.filter(function(r){return r[5]===grade});
        var rows=recs.map(function(r){return[empName(r[0]),r[0],r[3],r[2],r[5],r[6]]});
        showModal(grade+' 人员明细',buildTable(['姓名','工号','部门','小组','等级','员工状态'],rows));
      }
    }
  });

  // Dept grade stacked bar
  dc('c3_deptgrade');
  var dgLabels=[],dgDatasets=[];
  deptList.forEach(function(dep){dgLabels.push(dep)});
  var gradeColors={'超出预期':'#4a6fa5','符合预期+':'#6c8ebf','符合预期':'#8fabc7','符合预期-':'#c8d8e8','低于预期':'#ef4444'};
  gradeOrder.forEach(function(g){
    var data=[];
    deptList.forEach(function(dep){
      data.push(finished.filter(function(r){return r[3]===dep&&r[5]===g}).length);
    });
    dgDatasets.push({label:g,data:data,backgroundColor:gradeColors[g]});
  });
  charts['c3_deptgrade']=new Chart(document.getElementById('c3_deptgrade'),{
    type:'bar',
    data:{labels:dgLabels,datasets:dgDatasets},
    options:{responsive:true,scales:{x:{stacked:true},y:{stacked:true,beginAtZero:true}},plugins:{legend:{position:'top'}},
      onClick:function(evt,els){
        if(!els.length)return;
        var idx=els[0].index;var dsIdx=els[0].datasetIndex;
        var dep=dgLabels[idx];var grade=gradeOrder[dsIdx];
        var recs=finished.filter(function(r){return r[3]===dep&&r[5]===grade});
        var rows=recs.map(function(r){return[empName(r[0]),r[0],r[2],r[5],r[6]]});
        showModal(dep+' '+grade+' 人员',buildTable(['姓名','工号','小组','等级','员工状态'],rows));
      }
    }
  });

  // Health table - enhanced grade-based analysis
  var healthHtml='<table class="health-table"><thead><tr><th>部门</th><th>考核人数</th><th>超出预期</th><th>符合预期+</th><th>符合预期</th><th>符合预期-</th><th>低于预期</th><th>超出占比</th><th>低于占比</th><th>健康度</th><th>关注要点</th></tr></thead><tbody>';
  var healthNotes=[];
  deptList.forEach(function(dep){
    var recs=finished.filter(function(r){return r[3]===dep});
    var cnt=recs.length;
    var exc=recs.filter(function(r){return r[5]==='超出预期'}).length;
    var mp=recs.filter(function(r){return r[5]==='符合预期+'}).length;
    var mt=recs.filter(function(r){return r[5]==='符合预期'}).length;
    var mm=recs.filter(function(r){return r[5]==='符合预期-'}).length;
    var bel=recs.filter(function(r){return r[5]==='低于预期'}).length;
    var excPct=cnt>0?((exc/cnt)*100).toFixed(1):'0.0';
    var belPct=cnt>0?((bel/cnt)*100).toFixed(1):'0.0';
    var mmPct=cnt>0?((mm/cnt)*100).toFixed(1):'0.0';
    var dot='dot-gray';var badge='badge-gray';var statusText='-';var note='';
    if(cnt>=3){
      var excR=exc/cnt;var belR=bel/cnt;var mmR=mm/cnt;
      if(excR>=0.1&&belR<0.05){dot='dot-green';badge='badge-green';statusText='健康';
        note='绩效分布良好，高绩效人才占比高';
      }else if(belR>=0.15){dot='dot-red';badge='badge-red';statusText='预警';
        note='低于预期占比偏高('+belPct+'%)，需关注绩效改进计划';
        healthNotes.push('<b style="color:#ef4444">'+dep+'</b>：低于预期占比'+belPct+'%，建议启动绩效辅导或岗位匹配评估');
      }else if(belR>=0.05||excR<0.05){dot='dot-yellow';badge='badge-yellow';statusText='关注';
        var reasons=[];
        if(belR>=0.05)reasons.push('低于预期占比'+belPct+'%');
        if(excR<0.05)reasons.push('超出预期占比偏低('+excPct+'%)');
        if(mmR>=0.2)reasons.push('符合预期-占比偏高('+mmPct+'%)');
        note=reasons.join('，')+'，需关注团队激励与培养';
        healthNotes.push('<b style="color:#f59e0b">'+dep+'</b>：'+reasons.join('，'));
      }else{dot='dot-green';badge='badge-green';statusText='健康';
        note='绩效分布正常';
      }
    }else if(cnt>0){dot='dot-yellow';badge='badge-yellow';statusText='样本不足';
      note='考核人数少于3人，数据参考价值有限';
    }
    healthHtml+='<tr><td><b>'+dep+'</b></td><td>'+cnt+'</td><td>'+exc+'</td><td>'+mp+'</td><td>'+mt+'</td><td>'+mm+'</td><td>'+bel+'</td><td>'+excPct+'%</td><td>'+belPct+'%</td><td><span class="health-badge '+badge+'"><span class="dot '+dot+'" style="margin-right:4px"></span>'+statusText+'</span></td><td style="font-size:11px;color:#64748b;max-width:200px">'+note+'</td></tr>';
  });
  healthHtml+='</tbody></table>';
  // Add analysis notes
  healthHtml+='<div class="health-note"><b>健康度评估标准：</b>';
  healthHtml+='绿色(健康) = 超出预期占比≥10% 且 低于预期占比＜5%；';
  healthHtml+='黄色(关注) = 低于预期占比5%-15% 或 超出预期占比＜5%；';
  healthHtml+='红色(预警) = 低于预期占比≥15%。';
  healthHtml+=' 样本量＜3人的部门标记为"样本不足"。</div>';
  if(healthNotes.length>0){
    healthHtml+='<div class="health-note" style="margin-top:6px;border-left:3px solid #f59e0b"><b>本期重点关注：</b><br>'+healthNotes.join('；<br>')+'。</div>';
  }
  document.getElementById('healthTbl').innerHTML=healthHtml;

  // New hire performance - grade based
  renderNewHirePerf(d,m,p,deptList,finished);
}

function renderNewHirePerf(d,m,p,deptList,finished){
  // New hires: hireYM within recent 3 months
  var mIdx=getMonthIdx(m);
  var recentMonths=[];
  for(var i=Math.max(0,mIdx-2);i<=mIdx;i++){recentMonths.push(DATA.mM[i])}
  var newHires=DATA.R.filter(function(r){return recentMonths.indexOf(r[4])>=0&&r[1]!=='离职'});
  if(d!=='全部') newHires=newHires.filter(function(r){return r[2]===d});
  var newHireIds={};
  newHires.forEach(function(r){newHireIds[r[0]]=r});

  // Get their perf data for current period
  var nhPerf=finished.filter(function(r){return newHireIds[r[0]]});
  var gradeOrder=['超出预期','符合预期+','符合预期','符合预期-','低于预期'];

  // Count grades for new hires vs all
  var nhGradeCounts={},allGradeCounts={};
  gradeOrder.forEach(function(g){nhGradeCounts[g]=0;allGradeCounts[g]=0});
  nhPerf.forEach(function(r){if(r[5])nhGradeCounts[r[5]]=(nhGradeCounts[r[5]]||0)+1});
  finished.forEach(function(r){if(r[5])allGradeCounts[r[5]]=(allGradeCounts[r[5]]||0)+1});

  // Bar chart: new hire grade distribution vs overall grade distribution (%)
  dc('c3_newhire');
  var nhTotal=nhPerf.length||1;var allTotal=finished.length||1;
  var nhPctData=gradeOrder.map(function(g){return parseFloat(((nhGradeCounts[g]/nhTotal)*100).toFixed(1))});
  var allPctData=gradeOrder.map(function(g){return parseFloat(((allGradeCounts[g]/allTotal)*100).toFixed(1))});
  charts['c3_newhire']=new Chart(document.getElementById('c3_newhire'),{
    type:'bar',
    data:{labels:gradeOrder,datasets:[
      {label:'新入职占比(%)',data:nhPctData,backgroundColor:'#f59e0b'},
      {label:'全员占比(%)',data:allPctData,backgroundColor:'#6c8ebf'}
    ]},
    options:{responsive:true,plugins:{legend:{position:'top'}},scales:{y:{beginAtZero:true}},
      onClick:function(evt,els){
        if(!els.length)return;
        var idx=els[0].index;var grade=gradeOrder[idx];
        var recs=nhPerf.filter(function(r){return r[5]===grade});
        if(recs.length===0)recs=finished.filter(function(r){return r[5]===grade});
        var rows=recs.map(function(r){return[empName(r[0]),r[0],r[3],r[2],r[5],r[6],newHireIds[r[0]]?newHireIds[r[0]][4]:'-']});
        showModal(grade+' 人员明细',buildTable(['姓名','工号','部门','小组','等级','状态','入职月份'],rows));
      }
    }
  });

  // Detail table
  var tblHtml='<h4>新入职人员绩效明细（近3个月入职，共'+newHires.length+'人）</h4>';
  tblHtml+='<table class="nh-table"><thead><tr><th>姓名</th><th>工号</th><th>部门</th><th>小组</th><th>入职月份</th><th>绩效等级</th><th>考核状态</th></tr></thead><tbody>';
  newHires.forEach(function(r){
    var perfRec=DATA.P.find(function(p){return p[0]===r[0]&&p[1]===monthToPeriod(m)});
    var grade=perfRec?perfRec[5]||'-':'-';
    var status=perfRec?perfRec[7]||'-':'-';
    tblHtml+='<tr><td>'+empName(r[0])+'</td><td>'+r[0]+'</td><td>'+r[2]+'</td><td>'+(r[3]||'-')+'</td><td>'+r[4]+'</td><td>'+grade+'</td><td>'+status+'</td></tr>';
  });
  tblHtml+='</tbody></table>';
  if(newHires.length===0) tblHtml='<p style="color:#999;padding:10px">本期无新入职人员</p>';
  document.getElementById('newhireTbl').innerHTML=tblHtml;
}

/* ===== TAB 4: 离职预警 ===== */
function renderTab4(){
  var d=curDept();
  var leavers=DATA.R.filter(function(r){return r[1]==='离职'});
  if(d!=='全部') leavers=leavers.filter(function(r){return r[2]===d});

  var totalLeave=leavers.length;
  var monthCount={};
  DATA.mM.forEach(function(mm){monthCount[mm]=0});
  leavers.forEach(function(r){if(r[5])monthCount[r[5]]=(monthCount[r[5]]||0)+1});
  var activeMonths=DATA.mM.filter(function(mm){return monthCount[mm]>0}).length;
  var avgPerMonth=activeMonths>0?(totalLeave/activeMonths).toFixed(1):0;

  var totalActive=activeEmps().length+(d==='全部'?DATA.R.filter(function(r){return r[1]==='离职'}).length:DATA.R.filter(function(r){return r[1]==='离职'&&r[2]===d}).length);
  var leaveRate=totalActive>0?((totalLeave/totalActive)*100).toFixed(1):0;

  var voluntary=leavers.filter(function(r){return r[7]==='合同期内辞职'}).length;
  var volPct=totalLeave>0?((voluntary/totalLeave)*100).toFixed(1):0;

  // Summary
  var leaveByDept={};
  var allLeavers=d==='全部'?DATA.R.filter(function(r){return r[1]==='离职'}):leavers;
  allLeavers.forEach(function(r){leaveByDept[r[2]]=(leaveByDept[r[2]]||0)+1});
  var topDept=Object.keys(leaveByDept).sort(function(a,b){return leaveByDept[b]-leaveByDept[a]})[0]||'-';
  var topDeptCnt=leaveByDept[topDept]||0;

  var reasonCounts={};
  leavers.forEach(function(r){if(r[8])reasonCounts[r[8]]=(reasonCounts[r[8]]||0)+1});
  var topReason=Object.keys(reasonCounts).sort(function(a,b){return reasonCounts[b]-reasonCounts[a]})[0]||'暂无';

  document.getElementById('sum4').innerHTML='累计离职<b>'+totalLeave+'人</b>，月均<b>'+avgPerMonth+'人</b>，离职率<b>'+leaveRate+'%</b>。主动离职（合同期内辞职）占比<b>'+volPct+'%</b>。离职最多部门为<b style="color:#ef4444">'+topDept+'('+topDeptCnt+'人)</b>，主要离职原因为<b style="color:#f59e0b">'+topReason+'</b>。';

  // KPIs
  document.getElementById('kpi4').innerHTML=
    kpiCard('离职总数',totalLeave,'人')+
    kpiCard('月均离职',avgPerMonth,'人/月')+
    kpiCard('离职率',leaveRate,'%')+
    kpiCard('主动离职占比',volPct,'%');

  // Reason doughnut
  dc('c4_reason');
  var rLabels=Object.keys(reasonCounts),rData=Object.values(reasonCounts);
  if(rLabels.length===0){rLabels=['暂无'];rData=[0]}
  charts['c4_reason']=new Chart(document.getElementById('c4_reason'),{
    type:'doughnut',
    data:{labels:rLabels,datasets:[{data:rData,backgroundColor:COLORS.slice(0,rLabels.length)}]},
    options:{responsive:true,plugins:{legend:{position:'bottom'}},
      onClick:function(evt,els){
        if(!els.length)return;
        var reason=rLabels[els[0].index];
        var recs=leavers.filter(function(r){return r[8]===reason});
        var rows=recs.map(function(r){return[empName(r[0]),r[0],r[2],r[5],r[7]]});
        showModal(reason+' 离职人员',buildTable(['姓名','工号','部门','离职月份','离职类型'],rows));
      }
    }
  });

  // Type doughnut
  dc('c4_type');
  var typeCounts={};
  leavers.forEach(function(r){if(r[7])typeCounts[r[7]]=(typeCounts[r[7]]||0)+1});
  var tLabels=Object.keys(typeCounts),tData=Object.values(typeCounts);
  if(tLabels.length===0){tLabels=['暂无'];tData=[0]}
  charts['c4_type']=new Chart(document.getElementById('c4_type'),{
    type:'doughnut',
    data:{labels:tLabels,datasets:[{data:tData,backgroundColor:['#ef4444','#f59e0b','#ff9800','#ffc107']}]},
    options:{responsive:true,plugins:{legend:{position:'bottom'}},
      onClick:function(evt,els){
        if(!els.length)return;
        var tp=tLabels[els[0].index];
        var recs=leavers.filter(function(r){return r[7]===tp});
        var rows=recs.map(function(r){return[empName(r[0]),r[0],r[2],r[5],r[8]]});
        showModal(tp+' 离职人员',buildTable(['姓名','工号','部门','离职月份','离职原因'],rows));
      }
    }
  });

  // Monthly trend line
  dc('c4_trend');
  var trendLabels=[],trendData=[];
  DATA.mM.forEach(function(mm){
    trendLabels.push(mm.replace('2026-','')+'月');
    var cnt=leavers.filter(function(r){return r[5]===mm}).length;
    trendData.push(cnt);
  });
  charts['c4_trend']=new Chart(document.getElementById('c4_trend'),{
    type:'line',
    data:{labels:trendLabels,datasets:[{label:'离职人数',data:trendData,borderColor:'#ef4444',backgroundColor:'rgba(229,57,53,.15)',fill:true,tension:.3,pointRadius:5,pointBackgroundColor:'#ef4444'}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}},
      onClick:function(evt,els){
        if(!els.length)return;
        var idx=els[0].index;var mm=DATA.mM[idx];
        var recs=leavers.filter(function(r){return r[5]===mm});
        var rows=recs.map(function(r){return[empName(r[0]),r[0],r[2],r[7],r[8]]});
        showModal(mm+' 离职人员',buildTable(['姓名','工号','部门','离职类型','离职原因'],rows));
      }
    }
  });

  // Dept bar
  dc('c4_dept');
  var deptList=d==='全部'?DATA.d4:[d];
  var dLabels=[],dData=[];
  var allLeavers=DATA.R.filter(function(r){return r[1]==='离职'});
  deptList.forEach(function(dep){
    dLabels.push(dep);
    dData.push(allLeavers.filter(function(r){return r[2]===dep}).length);
  });
  charts['c4_dept']=new Chart(document.getElementById('c4_dept'),{
    type:'bar',
    data:{labels:dLabels,datasets:[{label:'离职人数',data:dData,backgroundColor:'#ef4444'}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}},
      onClick:function(evt,els){
        if(!els.length)return;
        var dep=dLabels[els[0].index];
        var recs=allLeavers.filter(function(r){return r[2]===dep});
        var rows=recs.map(function(r){return[empName(r[0]),r[0],r[5],r[7],r[8]]});
        showModal(dep+' 离职人员',buildTable(['姓名','工号','离职月份','离职类型','离职原因'],rows));
      }
    }
  });

  // Detail table
  var tblHtml='<table class="health-table"><thead><tr><th>姓名</th><th>工号</th><th>部门</th><th>小组</th><th>入职月份</th><th>离职月份</th><th>离职类型</th><th>离职原因</th></tr></thead><tbody>';
  leavers.forEach(function(r){
    tblHtml+='<tr><td>'+empName(r[0])+'</td><td>'+r[0]+'</td><td>'+r[2]+'</td><td>'+(r[3]||'-')+'</td><td>'+(r[4]||'-')+'</td><td>'+(r[5]||'-')+'</td><td>'+(r[7]||'-')+'</td><td>'+(r[8]||'-')+'</td></tr>';
  });
  tblHtml+='</tbody></table>';
  if(leavers.length===0)tblHtml='<p style="color:#999;padding:20px;text-align:center">暂无离职记录</p>';
  document.getElementById('leaveTbl').innerHTML=tblHtml;
}

/* ===== Render All ===== */
function renderAll(){renderTab1();renderTab2();renderTab3();renderTab4()}
renderAll();

</script>
