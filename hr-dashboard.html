<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DO 数字运营部 · 月度人力情况看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#1a237e;--primary-light:#283593;--bg:#f4f6fb;--card:#fff;--text:#222;--text-light:#666;--border:#e0e4ea;--shadow:0 2px 12px rgba(26,35,126,.08);--radius:10px;--green:#43a047;--yellow:#fbc02d;--red:#e53935;--blue:#1565c0;--orange:#ef6c00}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.header{background:linear-gradient(135deg,#1a237e 0%,#283593 50%,#3949ab 100%);color:#fff;padding:20px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header h1{font-size:22px;font-weight:700;letter-spacing:1px}
.header h1 span{font-size:13px;font-weight:400;opacity:.75;margin-left:8px}
.filters{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.filters label{font-size:13px;opacity:.85}
.filters select{padding:6px 14px;border:none;border-radius:6px;font-size:13px;background:rgba(255,255,255,.18);color:#fff;cursor:pointer;outline:none;min-width:120px}
.filters select option{color:#222;background:#fff}
.tabs{display:flex;gap:0;background:#fff;border-bottom:2px solid var(--border);padding:0 32px;position:sticky;top:0;z-index:50}
.tab-btn{padding:14px 28px;font-size:14px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--text-light);position:relative;transition:color .2s}
.tab-btn.active{color:var(--primary)}
.tab-btn.active::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:3px;background:var(--primary);border-radius:2px 2px 0 0}
.tab-btn:hover{color:var(--primary)}
.tab-content{display:none;padding:24px 32px}
.tab-content.active{display:block}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.kpi-card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);text-align:center}
.kpi-card .kpi-value{font-size:32px;font-weight:700;color:var(--primary)}
.kpi-card .kpi-label{font-size:13px;color:var(--text-light);margin-top:4px}
.kpi-card.green .kpi-value{color:var(--green)}
.kpi-card.red .kpi-value{color:var(--red)}
.kpi-card.orange .kpi-value{color:var(--orange)}
.kpi-card.blue .kpi-value{color:var(--blue)}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.chart-card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.chart-card.full{grid-column:1/-1}
.chart-card h3{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--text);display:flex;align-items:center;gap:6px}
.chart-card h3 .badge{font-size:11px;background:#e8eaf6;color:var(--primary);padding:2px 8px;border-radius:10px;font-weight:500}
.chart-wrap{position:relative;width:100%;max-height:350px}
.chart-wrap canvas{width:100%!important;max-height:350px}
.note-banner{background:linear-gradient(90deg,#e8eaf6,#f4f6fb);border-left:4px solid var(--primary);padding:12px 20px;border-radius:0 var(--radius) var(--radius) 0;margin-bottom:20px;font-size:13px;color:var(--primary-light)}
/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:1000;justify-content:center;align-items:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:12px;padding:28px;max-width:900px;width:92%;max-height:80vh;overflow:auto;box-shadow:0 8px 40px rgba(0,0,0,.2);position:relative}
.modal h2{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--primary);padding-right:30px}
.modal .close-btn{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;border:none;background:#f0f0f0;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:background .2s}
.modal .close-btn:hover{background:#e0e0e0}
.modal table{width:100%;border-collapse:collapse;font-size:13px}
.modal table th{background:#f5f6fa;padding:10px 12px;text-align:left;font-weight:600;border-bottom:2px solid var(--border);white-space:nowrap}
.modal table td{padding:9px 12px;border-bottom:1px solid #f0f0f0}
.modal table tr:hover td{background:#fafbfe}
/* Detail table in tab */
.detail-table-wrap{overflow-x:auto;margin-top:8px}
.detail-table-wrap table{width:100%;border-collapse:collapse;font-size:12px}
.detail-table-wrap th{background:#f5f6fa;padding:9px 10px;text-align:left;font-weight:600;border-bottom:2px solid var(--border);white-space:nowrap;position:sticky;top:0}
.detail-table-wrap td{padding:8px 10px;border-bottom:1px solid #f0f0f0}
.detail-table-wrap tr:hover td{background:#fafbfe}
/* Health table */
.health-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
.health-table th{background:#f5f6fa;padding:10px 14px;text-align:left;font-weight:600;border-bottom:2px solid var(--border)}
.health-table td{padding:10px 14px;border-bottom:1px solid #f0f0f0}
.health-dot{display:inline-block;width:16px;height:16px;border-radius:50%;vertical-align:middle}
.health-dot.green{background:var(--green)}
.health-dot.yellow{background:var(--yellow)}
.health-dot.red{background:var(--red)}
/* OT concentration */
.ot-conc-item{margin-bottom:16px;padding:14px;background:#fafbfe;border-radius:8px;border:1px solid #eee}
.ot-conc-item h4{font-size:13px;font-weight:600;margin-bottom:8px;color:var(--primary-light)}
.ot-conc-bar{display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:12px}
.ot-conc-bar .bar-bg{flex:1;height:18px;background:#e8eaf6;border-radius:4px;overflow:hidden}
.ot-conc-bar .bar-fill{height:100%;background:linear-gradient(90deg,#3949ab,#5c6bc0);border-radius:4px;transition:width .3s}
.ot-conc-bar .bar-label{min-width:80px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ot-conc-bar .bar-val{min-width:50px;text-align:right;font-weight:600;color:var(--primary)}
.ot-conc-pct{font-size:12px;color:var(--orange);font-weight:600;margin-top:4px}
@media(max-width:768px){.chart-grid{grid-template-columns:1fr}.header{padding:16px}.tab-content{padding:16px}.tabs{padding:0 8px;overflow-x:auto}.tab-btn{padding:12px 16px;font-size:13px;white-space:nowrap}}
</style>
</head>
<body>
<div class="header">
<h1>DO 数字运营部 · 月度人力情况看板<span>Monthly HR Dashboard</span></h1>
<div class="filters">
<label>月份</label>
<select id="filterMonth"></select>
<label>四级部门</label>
<select id="filterDept"><option value="">全部</option></select>
</div>
</div>
<div class="tabs">
<button class="tab-btn active" data-tab="tab1">人员动态</button>
<button class="tab-btn" data-tab="tab2">考勤情况</button>
<button class="tab-btn" data-tab="tab3">绩效考核</button>
<button class="tab-btn" data-tab="tab4">离职预警</button>
</div>

<!-- Tab 1 -->
<div id="tab1" class="tab-content active">
<div class="kpi-row" id="kpi1"></div>
<div class="chart-grid">
<div class="chart-card full"><h3>入职 / 离职 / 净增减趋势 <span class="badge">Jan-Jun 2026</span></h3><div class="chart-wrap"><canvas id="c_trend"></canvas></div></div>
<div class="chart-card"><h3>各四级部门人数分布</h3><div class="chart-wrap"><canvas id="c_dept_count"></canvas></div></div>
<div class="chart-card"><h3>司龄分布</h3><div class="chart-wrap"><canvas id="c_tenure"></canvas></div></div>
<div class="chart-card"><h3>年龄分布</h3><div class="chart-wrap"><canvas id="c_age"></canvas></div></div>
<div class="chart-card"><h3>离职原因分析</h3><div class="chart-wrap"><canvas id="c_leave_reason"></canvas></div></div>
</div>
</div>

<!-- Tab 2 -->
<div id="tab2" class="tab-content">
<div class="note-banner" id="note2"></div>
<div class="kpi-row" id="kpi2"></div>
<div class="chart-grid">
<div class="chart-card"><h3>各四级部门出勤率</h3><div class="chart-wrap"><canvas id="c_attend_rate"></canvas></div></div>
<div class="chart-card"><h3>各四级部门加班工时</h3><div class="chart-wrap"><canvas id="c_ot_dept"></canvas></div></div>
<div class="chart-card"><h3>加班类型构成</h3><div class="chart-wrap"><canvas id="c_ot_type"></canvas></div></div>
<div class="chart-card"><h3>请假类型分布</h3><div class="chart-wrap"><canvas id="c_leave_type"></canvas></div></div>
<div class="chart-card full"><h3>加班集中度分析</h3><div id="ot_concentration"></div></div>
<div class="chart-card"><h3>各四级部门迟到次数</h3><div class="chart-wrap"><canvas id="c_late_dept"></canvas></div></div>
</div>
</div>

<!-- Tab 3 -->
<div id="tab3" class="tab-content">
<div class="kpi-row" id="kpi3"></div>
<div class="chart-grid">
<div class="chart-card"><h3>绩效等级分布</h3><div class="chart-wrap"><canvas id="c_perf_grade"></canvas></div></div>
<div class="chart-card"><h3>绩效分数分布</h3><div class="chart-wrap"><canvas id="c_perf_score"></canvas></div></div>
<div class="chart-card full"><h3>各四级部门绩效等级分布</h3><div class="chart-wrap"><canvas id="c_perf_dept_stack"></canvas></div></div>
<div class="chart-card full"><h3>各四级部门平均绩效分</h3><div class="chart-wrap"><canvas id="c_perf_dept_avg"></canvas></div></div>
<div class="chart-card full"><h3>绩效分布健康度</h3><div id="health_table"></div></div>
</div>
</div>

<!-- Tab 4 -->
<div id="tab4" class="tab-content">
<div class="kpi-row" id="kpi4"></div>
<div class="chart-grid">
<div class="chart-card"><h3>离职原因分布</h3><div class="chart-wrap"><canvas id="c_turnover_reason"></canvas></div></div>
<div class="chart-card"><h3>离职类型分布</h3><div class="chart-wrap"><canvas id="c_turnover_type"></canvas></div></div>
<div class="chart-card"><h3>各月离职趋势</h3><div class="chart-wrap"><canvas id="c_turnover_trend"></canvas></div></div>
<div class="chart-card"><h3>各四级部门离职人数</h3><div class="chart-wrap"><canvas id="c_turnover_dept"></canvas></div></div>
<div class="chart-card full"><h3>离职人员明细表</h3><div class="detail-table-wrap" id="turnover_detail"></div></div>
</div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
<div class="modal" id="modalContent">
<button class="close-btn" id="modalClose">&times;</button>
<h2 id="modalTitle"></h2>
<div id="modalBody"></div>
</div>
</div>

// ========== INIT FILTERS ==========
(function initFilters(){
  var sel = document.getElementById('filterMonth');
  MONTHS.forEach(function(m){
    var o = document.createElement('option');
    o.value = m; o.textContent = m;
    sel.appendChild(o);
  });

  var dsel = document.getElementById('filterDept');
  D4.forEach(function(d){

    dsel.appendChild(o);
  });

// ========== HELPERS ==========
function getMonth(){ return document.getElementById('filterMonth').value; }
function getDept(){ return document.getElementById('filterDept').value; }

function destroyChart(id){
  if(charts[id]){ charts[id].destroy(); delete charts[id]; }
}

function kpiHtml(arr){
  return arr.map(function(k){
    return '<div class="kpi-card '+(k.cls||'')+'"><div class="kpi-value">'+k.value+'</div><div class="kpi-label">'+k.label+'</div></div>';
  }).join('');
}

function showModal(title, html){
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('show');
}

function buildTable(headers, rows){
  var h = '<table><thead><tr>' + headers.map(function(h){return '<th>'+h+'</th>';}).join('') + '</tr></thead><tbody>';
  rows.forEach(function(r){
    h += '<tr>' + r.map(function(c){return '<td>'+(c==null?'':c)+'</td>';}).join('') + '</tr>';
  });
  h += '</tbody></table>';
  return h;
}

// ========== DATA PROCESSING ==========

// Get active employees as of a given month (hired on or before, not left or left after)
function getActiveRoster(month){
  var dept = getDept();
  return DATA.R.filter(function(r){
    if(dept && r[2] !== dept) return false;
    var hired = r[4]; // hireYM
    if(!hired || hired > month) return false;
    var left = r[5]; // leaveYM
    if(r[1] === '离职' && left && left <= month) return false;
    return true;
  });
}

function getHiresInMonth(month){
  var dept = getDept();
  return DATA.R.filter(function(r){
    if(dept && r[2] !== dept) return false;
    return r[4] === month;
  });
}

function getLeavesInMonth(month){
  var dept = getDept();
  return DATA.R.filter(function(r){
    if(dept && r[2] !== dept) return false;
    return r[1] === '离职' && r[5] === month;
  });
}

function getMonthlyAttendance(month){
  var dept = getDept();
  return DATA.M.filter(function(r){
    if(r[1] !== month) return false;
    if(dept){
      if(r[2] !== dept) return false;
    } else {
      // Exclude top-level "DO 数字运营部" when no filter, include only d4-level
      // Actually include all records
    }
    return true;
  });
}

function getPerfData(period){
  var dept = getDept();
  // Only 已结束, deduplicate by empId (keep latest if multiple, but should be 1 per period)
  var seen = {};
  var result = [];
  DATA.P.forEach(function(r){
    if(r[7] !== '已结束') return;
    if(period && r[1] !== period) return;
    if(dept && r[3] !== dept) return;
    if(!seen[r[0]]){
      seen[r[0]] = true;
      result.push(r);
    }
  });
  return result;
}

    {label:'在职人数', value:active.length, cls:'blue'},
    {label:'本月入职', value:hires.length, cls:'green'},

      return r[4]===m;
    }).length;

      },
      plugins:{legend:{position:'top'}}
    }
  });

  // Chart 2: Dept count (active employees)
  var deptCounts = {};
  var deptFilter = getDept();
  D4.forEach(function(d){ deptCounts[d] = 0; });
  active.forEach(function(r){ if(deptCounts[r[2]]!==undefined) deptCounts[r[2]]++; });

  if(deptFilter){
    // Only show selected dept
    var labels2 = [deptFilter], vals2 = [deptCounts[deptFilter]||0];
  } else {

  }

  destroyChart('c_dept_count');
  charts['c_dept_count'] = new Chart(document.getElementById('c_dept_count'),{
    type:'bar',
    data:{labels:labels2, datasets:[{label:'人数',data:vals2,backgroundColor:'#3949ab',borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,indexAxis:'x',
      scales:{y:{beginAtZero:true,ticks:{stepSize:1}}},
      plugins:{legend:{display:false}},
      onClick:function(e,els){
        if(!els.length) return;
        var idx = els[0].index;
        var dName = labels2[idx];
        var emps = active.filter(function(r){return r[2]===dName;});
        var rows = emps.map(function(r){return [r[0],r[1],r[2],r[3]||'-',r[4],r[6]];});
        showModal(dName+' - 员工花名册 ('+emps.length+'人)', buildTable(['工号','状态','四级部门','五级部门','入职月份','类型'],rows));
      }
    }
  });

  // Chart 3: Tenure distribution (based on hire date from earliest month)
  var tenureBuckets = {'<3个月':0,'3-6个月':0,'6-12个月':0,'1-2年':0,'2年以上':0};
  var refDate = new Date(month+'-01');
  active.forEach(function(r){
    var hd = new Date(r[4]+'-01');
    var months = (refDate.getFullYear()-hd.getFullYear())*12 + (refDate.getMonth()-hd.getMonth());
    if(months<0) months=0;
    if(months<3) tenureBuckets['<3个月']++;
    else if(months<6) tenureBuckets['3-6个月']++;
    else if(months<12) tenureBuckets['6-12个月']++;

    options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',scales:{x:{beginAtZero:true,ticks:{stepSize:1}}},plugins:{legend:{display:false}}}

  charts['c_perf_dept_stack'] = new Chart(document.getElementById('c_perf_dept_stack'),{
    type:'bar',
    data:{labels:perfDepts,datasets:gradeOrder.map(function(g){
      return {label:g,data:stackData[g],backgroundColor:stackColors[g],borderRadius:2};
    })},
    options:{responsive:true,maintainAspectRatio:false,scales:{x:{stacked:true},y:{stacked:true,beginAtZero:true,ticks:{stepSize:1}}},plugins:{legend:{position:'top'}},
      onClick:function(e,els){
        if(!els.length) return;
        var dName = perfDepts[els[0].index];
        var emps = graded.filter(function(r){return r[3]===dName;});
        var rows = emps.map(function(r){return [r[0],r[2],r[4],r[5],r[6]];});
        showModal(dName+' - 绩效明细 ('+period+')', buildTable(['工号','五级部门','分数','等级','员工状态'],rows));
      }
    }
  });

  // Chart 4: Avg score by dept (full width)
  var avgByDept = perfDepts.map(function(d){
    var dg = graded.filter(function(r){return r[3]===d;});
    return dg.length>0 ? +(dg.reduce(function(s,r){return s+r[4];},0)/dg.length).toFixed(1) : 0;
  });

  destroyChart('c_perf_dept_avg');
  charts['c_perf_dept_avg'] = new Chart(document.getElementById('c_perf_dept_avg'),{
    type:'bar',
    data:{labels:perfDepts,datasets:[{label:'平均绩效分',data:avgByDept,backgroundColor:perfDepts.map(function(d,i){return COLORS[i%COLORS.length];}),borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,scales:{y:{beginAtZero:true,max:100}},plugins:{legend:{display:false}},
      onClick:function(e,els){
        if(!els.length) return;
        var dName = perfDepts[els[0].index];
        var emps = graded.filter(function(r){return r[3]===dName;}).sort(function(a,b){return b[4]-a[4];});
        var rows = emps.map(function(r){return [r[0],r[2],r[4],r[5]];});
        showModal(dName+' - 绩效排名 ('+period+')', buildTable(['工号','五级部门','分数','等级'],rows));
      }
    }
  });

  // Chart 5: Health indicator table
  var healthHtml = '<table class="health-table"><thead><tr><th>四级部门</th><th>考核人数</th><th>超出预期</th><th>符合预期+</th><th>符合预期</th><th>符合预期-</th><th>低于预期</th><th>健康度</th><th>说明</th></tr></thead><tbody>';

  perfDepts.forEach(function(d){
    var dg = graded.filter(function(r){return r[3]===d;});
    if(dg.length===0){
      healthHtml += '<tr><td>'+d+'</td><td colspan="8" style="color:#999">无已结束考核数据</td></tr>';
      return;
    }
    var gc = {};
    gradeOrder.forEach(function(g){gc[g]=0;});
    dg.forEach(function(r){if(gc[r[5]]!==undefined) gc[r[5]]++;});
    var total = dg.length;
    var exceedPctV = gc['超出预期']/total*100;
    var belowMinusPctV = gc['符合预期-']/total*100;
    var lowPctV = gc['低于预期']/total*100;
    var hasDiff = (gc['超出预期']>0 && gc['符合预期-']>0) || (gc['超出预期']>0 && gc['符合预期+']>0 && gc['符合预期']>0 && gc['符合预期-']>0);
    var allSame = (gc['超出预期']===total || gc['符合预期']===total || gc['符合预期+']===total);

    var light, note;
    if(allSame || lowPctV > 10){
      light = 'red';
      note = allSame ? '全部同一等级(无分化)' : '低于预期占比过高(>10%)';
    } else if(exceedPctV > 25 || belowMinusPctV > 15){
      light = 'yellow';
      note = exceedPctV > 25 ? '超出预期占比偏高(>25%)' : '符合预期-占比偏高(>15%)';
    } else if(exceedPctV >= 10 && exceedPctV <= 25 && belowMinusPctV <= 15 && hasDiff){
      light = 'green';
      note = '分布健康，有分化';
    } else if(exceedPctV < 10 && !allSame){
      light = 'yellow';
      note = '超出预期占比偏低(<10%)';
    } else {
      light = 'yellow';
      note = '需关注分布';
    }

    healthHtml += '<tr><td><b>'+d+'</b></td><td>'+total+'</td>';
    gradeOrder.forEach(function(g){
      healthHtml += '<td>'+gc[g]+' ('+(total>0?(gc[g]/total*100).toFixed(0):0)+'%)</td>';
    });
    healthHtml += '<td><span class="health-dot '+light+'"></span></td><td>'+note+'</td></tr>';
  });

  healthHtml += '</tbody></table>';
  document.getElementById('health_table').innerHTML = healthHtml;
}

// ========== TAB 4: 离职预警 ==========
function renderTab4(){
  var dept = getDept();

  var leftEmps = DATA.R.filter(function(r){
    if(r[1]!=='离职') return false;
    if(dept && r[2]!==dept) return false;
    return true;
  });

  // Filter to 2026 leaves
  var left2026 = leftEmps.filter(function(r){
    return r[5] && r[5].startsWith('2026');
  });

  var activeAll = DATA.R.filter(function(r){
    if(dept && r[2]!==dept) return false;
    return r[1]!=='离职';
  });

  var totalLeft = left2026.length;
  var avgMonthly = (totalLeft/6).toFixed(1);
  var turnoverRate = (activeAll.length+left2026.length)>0 ? (left2026.length/(activeAll.length+left2026.length)*100).toFixed(1)+'%' : '-';
  var voluntaryCount = left2026.filter(function(r){return r[7]==='试用期内辞职'||r[7]==='合同期内辞职';}).length;
  var voluntaryPct = totalLeft>0 ? (voluntaryCount/totalLeft*100).toFixed(1)+'%' : '-';

  document.getElementById('kpi4').innerHTML = kpiHtml([
    {label:'2026年离职总数',value:totalLeft,cls:'red'},
    {label:'月均离职',value:avgMonthly,cls:'orange'},
    {label:'离职率',value:turnoverRate,cls:'red'},
    {label:'主动离职占比',value:voluntaryPct}
  ]);

  // Chart 1: Leave reason doughnut
  var reasons = {};
  left2026.forEach(function(r){
    var reason = r[8] || '未记录';
    reasons[reason] = (reasons[reason]||0)+1;
  });

  destroyChart('c_turnover_reason');
  charts['c_turnover_reason'] = new Chart(document.getElementById('c_turnover_reason'),{
    type:'doughnut',
    data:{labels:Object.keys(reasons),datasets:[{data:Object.values(reasons),backgroundColor:COLORS.slice(0,Object.keys(reasons).length),borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}}}
  });

  // Chart 2: Leave type doughnut
  var types = {};
  left2026.forEach(function(r){
    var t = r[7] || '未记录';
    types[t] = (types[t]||0)+1;
  });

  destroyChart('c_turnover_type');
  charts['c_turnover_type'] = new Chart(document.getElementById('c_turnover_type'),{
    type:'doughnut',
    data:{labels:Object.keys(types),datasets:[{data:Object.values(types),backgroundColor:['#3949ab','#5c6bc0','#9fa8da','#c5cae9'],borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}}}
  });

  // Chart 3: Monthly trend (line)
  var monthlyLeft = MONTHS.map(function(m){
    return left2026.filter(function(r){return r[5]===m;}).length;
  });

  destroyChart('c_turnover_trend');
  charts['c_turnover_trend'] = new Chart(document.getElementById('c_turnover_trend'),{
    type:'line',
    data:{labels:MONTHS,datasets:[{label:'离职人数',data:monthlyLeft,borderColor:'#e53935',backgroundColor:'rgba(229,57,53,0.1)',tension:.3,fill:true,pointRadius:6,pointBackgroundColor:'#e53935'}]},
    options:{responsive:true,maintainAspectRatio:false,scales:{y:{beginAtZero:true,ticks:{stepSize:1}}},plugins:{legend:{display:false}}}
  });

  // Chart 4: Dept bar
  var deptLeft = {};
  D4.forEach(function(d){deptLeft[d]=0;});
  left2026.forEach(function(r){if(deptLeft[r[2]]!==undefined) deptLeft[r[2]]++;});

  var dLabels = dept ? [dept] : D4.slice();
  var dVals = dLabels.map(function(d){return deptLeft[d]||0;});

  destroyChart('c_turnover_dept');
  charts['c_turnover_dept'] = new Chart(document.getElementById('c_turnover_dept'),{
    type:'bar',
    data:{labels:dLabels,datasets:[{label:'离职人数',data:dVals,backgroundColor:'#e53935',borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,scales:{y:{beginAtZero:true,ticks:{stepSize:1}}},plugins:{legend:{display:false}}}
  });

  // Detail table
  function monthDiff(a,b){
    if(!a||!b) return '-';
    var pa=a.split('-').map(Number), pb=b.split('-').map(Number);
    return (pb[0]-pa[0])*12+(pb[1]-pa[1]);
  }

  var rows = left2026.map(function(r){
    return [r[0],r[0],r[2],r[3]||'-',r[4],r[5],monthDiff(r[4],r[5]),r[7]||'-',r[8]||'-'];
  });

  var tableHtml = buildTable(['工号','姓名','四级部门','五级部门','入职月份','离职月份','在职月数','离职类型','离职原因'], rows);
  document.getElementById('turnover_detail').innerHTML = tableHtml;
}

// ========== INITIAL RENDER ==========
render();
</script>
