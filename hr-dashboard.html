<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DO数字运营部月度人力情况看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;background:#eef1f5;color:#333;min-height:100vh}
.header{background:linear-gradient(135deg,#1a237e 0%,#283593 50%,#3949ab 100%);color:#fff;padding:18px 30px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header h1{font-size:22px;font-weight:700;letter-spacing:1px}
.filters{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.filters label{font-size:13px;opacity:.85}
.filters select{padding:6px 14px;border:none;border-radius:6px;font-size:13px;background:rgba(255,255,255,.18);color:#fff;outline:none;cursor:pointer;min-width:130px}
.filters select option{color:#333;background:#fff}
.tab-bar{display:flex;background:#fff;border-bottom:2px solid #e0e0e0;padding:0 20px}
.tab-btn{padding:14px 28px;font-size:15px;font-weight:600;cursor:pointer;border:none;background:none;color:#666;position:relative;transition:color .2s}
.tab-btn.active{color:#1a237e}
.tab-btn.active::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:3px;background:#1a237e;border-radius:2px 2px 0 0}
.tab-btn:hover{color:#1a237e}
.tab-panel{display:none;padding:20px 24px;max-width:1440px;margin:0 auto}
.tab-panel.active{display:block}
.summary-box{background:#f0f4ff;border-left:4px solid #1a237e;padding:16px 20px;font-size:14px;line-height:1.8;margin-bottom:20px;border-radius:0 8px 8px 0;color:#333}
.summary-box b{font-weight:700}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:20px}
.kpi-card{background:#fff;border-radius:10px;padding:18px 20px;box-shadow:0 2px 8px rgba(0,0,0,.07);text-align:center}
.kpi-card .label{font-size:13px;color:#888;margin-bottom:6px}
.kpi-card .value{font-size:28px;font-weight:700;color:#1a237e}
.kpi-card .sub{font-size:12px;color:#999;margin-top:4px}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:20px}
.chart-card{background:#fff;border-radius:10px;padding:18px 20px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.chart-card.full{grid-column:1/-1}
.chart-card h3{font-size:15px;font-weight:600;color:#333;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #eee}
.chart-card canvas{width:100%!important}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:9999;justify-content:center;align-items:center}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:12px;padding:28px;max-width:800px;width:90%;max-height:80vh;overflow:auto;box-shadow:0 8px 40px rgba(0,0,0,.25);position:relative}
.modal-box .close-btn{position:absolute;top:12px;right:16px;font-size:22px;cursor:pointer;color:#999;background:none;border:none;line-height:1}
.modal-box .close-btn:hover{color:#333}
.modal-box h3{font-size:17px;font-weight:700;margin-bottom:16px;color:#1a237e}
.modal-table{width:100%;border-collapse:collapse;font-size:13px}
.modal-table th{background:#f5f5f5;padding:8px 10px;text-align:left;font-weight:600;border-bottom:2px solid #ddd}
.modal-table td{padding:7px 10px;border-bottom:1px solid #eee}
.modal-table tr:hover td{background:#f9f9ff}
.health-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
.health-table th{background:#f5f7fa;padding:10px 12px;text-align:left;font-weight:600;border-bottom:2px solid #ddd}
.health-table td{padding:9px 12px;border-bottom:1px solid #eee}
.dot{display:inline-block;width:12px;height:12px;border-radius:50%;margin-right:6px;vertical-align:middle}
.dot-green{background:#4caf50}
.dot-yellow{background:#ff9800}
.dot-red{background:#f44336}
.dot-gray{background:#bdbdbd}
.new-hire-section{margin-top:16px}
.new-hire-section h4{font-size:14px;font-weight:600;margin-bottom:10px;color:#555}
.nh-table{width:100%;border-collapse:collapse;font-size:12px}
.nh-table th{background:#f0f4ff;padding:7px 10px;text-align:left;font-weight:600;border-bottom:2px solid #c5cae9}
.nh-table td{padding:6px 10px;border-bottom:1px solid #eee}
@media(max-width:900px){.chart-grid{grid-template-columns:1fr}.kpi-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div class="header">
  <h1>DO数字运营部 月度人力情况看板</h1>
  <div class="filters">
    <label>月份</label><select id="selMonth"></select>
    <label>部门</label><select id="selDept"><option value="全部">全部部门</option></select>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="tab1">人员动态</button>
  <button class="tab-btn" data-tab="tab2">考勤情况</button>
  <button class="tab-btn" data-tab="tab3">绩效考核</button>
  <button class="tab-btn" data-tab="tab4">离职预警</button>
</div>

<div id="tab1" class="tab-panel active">
  <div class="summary-box" id="sum1"></div>
  <div class="kpi-row" id="kpi1"></div>
  <div class="chart-grid">
    <div class="chart-card full"><h3>入职/离职/净增减趋势（1月-6月）</h3><canvas id="c1_trend" height="90"></canvas></div>
    <div class="chart-card"><h3>各四级部门人数分布</h3><canvas id="c1_dept" height="160"></canvas></div>
    <div class="chart-card"><h3>司龄分布</h3><canvas id="c1_tenure" height="160"></canvas></div>
    <div class="chart-card"><h3>员工类型分布</h3><canvas id="c1_type" height="160"></canvas></div>
    <div class="chart-card"><h3>离职原因分析</h3><canvas id="c1_reason" height="160"></canvas></div>
  </div>
</div>

<div id="tab2" class="tab-panel">
  <div class="summary-box" id="sum2"></div>
  <div class="kpi-row" id="kpi2"></div>
  <div class="chart-grid">
    <div class="chart-card"><h3>各四级部门出勤率</h3><canvas id="c2_attend" height="160"></canvas></div>
    <div class="chart-card"><h3>各四级部门加班工时</h3><canvas id="c2_ot" height="160"></canvas></div>
    <div class="chart-card"><h3>加班类型构成</h3><canvas id="c2_ottype" height="160"></canvas></div>
    <div class="chart-card"><h3>请假类型分布</h3><canvas id="c2_lvtype" height="160"></canvas></div>
    <div class="chart-card full"><h3>加班集中度分析（各部门Top5）</h3><canvas id="c2_otfocus" height="100"></canvas></div>
    <div class="chart-card"><h3>各四级部门迟到次数</h3><canvas id="c2_late" height="160"></canvas></div>
  </div>
</div>

<div id="tab3" class="tab-panel">
  <div class="summary-box" id="sum3"></div>
  <div class="kpi-row" id="kpi3"></div>
  <div class="chart-grid">
    <div class="chart-card"><h3>绩效等级分布</h3><canvas id="c3_grade" height="160"></canvas></div>
    <div class="chart-card"><h3>绩效分数分布</h3><canvas id="c3_score" height="160"></canvas></div>
    <div class="chart-card full"><h3>各四级部门绩效等级分布</h3><canvas id="c3_deptgrade" height="100"></canvas></div>
    <div class="chart-card full"><h3>各四级部门平均绩效分</h3><canvas id="c3_deptavg" height="90"></canvas></div>
    <div class="chart-card full"><h3>绩效分布健康度</h3><div id="healthTbl"></div></div>
    <div class="chart-card full"><h3>新入职人员绩效</h3><canvas id="c3_newhire" height="90"></canvas><div id="newhireTbl" class="new-hire-section"></div></div>
  </div>
</div>

<div id="tab4" class="tab-panel">
  <div class="summary-box" id="sum4"></div>
  <div class="kpi-row" id="kpi4"></div>
  <div class="chart-grid">
    <div class="chart-card"><h3>离职原因分布</h3><canvas id="c4_reason" height="160"></canvas></div>
    <div class="chart-card"><h3>离职类型分布</h3><canvas id="c4_type" height="160"></canvas></div>
    <div class="chart-card"><h3>各月离职趋势</h3><canvas id="c4_trend" height="160"></canvas></div>
    <div class="chart-card"><h3>各四级部门离职人数</h3><canvas id="c4_dept" height="160"></canvas></div>
    <div class="chart-card full"><h3>离职人员明细表</h3><div id="leaveTbl"></div></div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <button class="close-btn" onclick="closeModal()">&times;</button>
    <h3 id="modalTitle"></h3>
    <div id="modalBody"></div>
  </div>
</div>

/* ===== Utility ===== */
var charts={};
function dc(id){if(charts[id]){charts[id].destroy();delete charts[id]}}
var COLORS=['#1a237e','#3949ab','#5c6bc0','#7986cb','#9fa8da','#c5cae9','#e8eaf6','#303f9f','#1565c0','#42a5f5','#ef6c00','#e53935','#43a047','#8e24aa','#00897b','#6d4c41'];
var COLORS_A=COLORS.map(c=>c+'cc');

function monthToPeriod(m){var map={'2026-01':'一月','2026-02':'二月','2026-03':'三月','2026-04':'四月','2026-05':'五月','2026-06':'六月'};return map[m]||m}
function periodToMonth(p){var map={'一月':'2026-01','二月':'2026-02','三月':'2026-03','四月':'2026-04','五月':'2026-05','六月':'2026-06'};return map[p]||p}
function getMonthIdx(m){return DATA.mM.indexOf(m)}

function showModal(title,html){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=html;
  document.getElementById('modal').classList.add('show');
}
function closeModal(){document.getElementById('modal').classList.remove('show')}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal()});

function buildTable(headers,rows){
  var h='<table class="modal-table"><thead><tr>';
  headers.forEach(function(x){h+='<th>'+x+'</th>'});
  h+='</tr></thead><tbody>';
  rows.forEach(function(r){h+='<tr>';r.forEach(function(c){h+='<td>'+(c==null?'-':c)+'</td>'});h+='</tr>'});
  h+='</tbody></table>';
  if(rows.length===0) h+='<p style="color:#999;text-align:center;padding:20px">暂无数据</p>';
  return h;
}

/* ===== Filters ===== */
var selMonth=document.getElementById('selMonth');
var selDept=document.getElementById('selDept');

DATA.mM.forEach(function(m){var o=document.createElement('option');o.value=m;o.textContent=m;selMonth.appendChild(o)});
selMonth.value=DATA.mM[DATA.mM.length-1];
DATA.d4.forEach(function(d){var o=document.createElement('option');o.value=d;o.textContent=d;selDept.appendChild(o)});

selMonth.addEventListener('change',renderAll);
selDept.addEventListener('change',renderAll);
document.querySelectorAll('.tab-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});
    document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.remove('active')});
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
  });
});

function curMonth(){return selMonth.value}
function curDept(){return selDept.value}

/* ===== Filtered data helpers ===== */
function activeEmps(){return DATA.R.filter(function(r){return r[1]!=='离职'})}
function filterDept(list,d4Idx){var d=curDept();if(d==='全部')return list;return list.filter(function(r){return r[d4Idx]===d})}
function filterMonth_M(list){var m=curMonth();return list.filter(function(r){return r[1]===m})}
function filterMonth_P(list){var p=monthToPeriod(curMonth());return list.filter(function(r){return r[1]===p})}
function hireMonth(m){return DATA.R.filter(function(r){return r[4]===m})}
function leaveMonth(m){return DATA.R.filter(function(r){return r[5]===m})}
function hireMonthDept(m){var d=curDept();var h=hireMonth(m);if(d==='全部')return h;return h.filter(function(r){return r[2]===d})}
function leaveMonthDept(m){var d=curDept();var l=leaveMonth(m);if(d==='全部')return l;return l.filter(function(r){return r[2]===d})}

/* ===== TAB 1: 人员动态 ===== */
function renderTab1(){
  var d=curDept(), m=curMonth();
  var active=activeEmps();
  if(d!=='全部') active=active.filter(function(r){return r[2]===d});
  var hires=hireMonthDept(m);
  var leaves=leaveMonthDept(m);
  var net=hires.length-leaves.length;

  // Summary
  var totalHires=0,totalLeaves=0;
  DATA.mM.forEach(function(mm){totalHires+=hireMonthDept(mm).length;totalLeaves+=leaveMonthDept(mm).length});
  var leaveByDept={};
  var allLeaves=DATA.R.filter(function(r){return r[5]!==''});
  if(d!=='全部') allLeaves=allLeaves.filter(function(r){return r[2]===d});
  allLeaves.forEach(function(r){leaveByDept[r[2]]=(leaveByDept[r[2]]||0)+1});
  var sortedDepts=Object.keys(leaveByDept).sort(function(a,b){return leaveByDept[b]-leaveByDept[a]});
  var leaveDeptText='';
  if(sortedDepts.length>0){
    leaveDeptText='离职主要集中在';
    sortedDepts.slice(0,2).forEach(function(dep,i){
      var color=dep==='交付组'?'#e53935':dep==='美国技术支持组'?'#ef6c00':'#1a237e';
      leaveDeptText+=(i>0?'和':'')+'<b style="color:'+color+'">'+dep+'('+leaveByDept[dep]+'人)</b>';
    });
    leaveDeptText+='。';
  }
  document.getElementById('sum1').innerHTML='本月入职<b>'+hires.length+'人</b>，离职<b>'+leaves.length+'人</b>，净增<b style="color:'+(net>=0?'#43a047':'#e53935')+'">'+(net>=0?'+':'')+net+'人</b>。上半年累计入职<b>'+totalHires+'人</b>，离职<b>'+totalLeaves+'人</b>。'+leaveDeptText;

  // KPIs
  document.getElementById('kpi1').innerHTML=
    kpiCard('在职人数',active.length,'人')+
    kpiCard('本月入职',hires.length,'人')+
    kpiCard('本月离职',leaves.length,'人')+
    kpiCard('净增减',(net>=0?'+':'')+net,'人');

  // Trend chart
  dc('c1_trend');
  var trendLabels=[],hireData=[],leaveData=[],netData=[];
  DATA.mM.forEach(function(mm){
    trendLabels.push(mm.replace('2026-','')+'月');
    var h=hireMonthDept(mm).length,l=leaveMonthDept(mm).length;
    hireData.push(h);leaveData.push(l);netData.push(h-l);
  });
  charts['c1_trend']=new Chart(document.getElementById('c1_trend'),{
    type:'bar',

function kpiCard(label,value,sub){return'<div class="kpi-card"><div class="label">'+label+'</div><div class="value">'+value+'</div><div class="sub">'+sub+'</div></div>'}

/* ===== TAB 2: 考勤情况 ===== */
function renderTab2(){

    totalLate+=r[5]||0;totalOT+=r[6]||0;

  });

  var deptAttend={};

    options:{responsive:true,plugins:{legend:{position:'bottom'}},

/* ===== TAB 3: 绩效考核 ===== */
function renderTab3(){
  var d=curDept(),m=curMonth(),p=monthToPeriod(m);
  var pData=DATA.P.filter(function(r){return r[1]===p});
  if(d!=='全部') pData=pData.filter(function(r){return r[3]===d});
  var finished=pData.filter(function(r){return r[7]==='已结束'});
  var withScore=finished.filter(function(r){return r[4]!==null});

  var avgScore=0;
  if(withScore.length>0){var s=0;withScore.forEach(function(r){s+=r[4]});avgScore=(s/withScore.length).toFixed(2)}
  var exceed=finished.filter(function(r){return r[5]==='超出预期'}).length;
  var meet=finished.filter(function(r){return r[5]==='符合预期'||r[5]==='符合预期+'||r[5]==='符合预期-'}).length;
  var below=finished.filter(function(r){return r[5]==='低于预期'}).length;
  var exceedPct=finished.length>0?((exceed/finished.length)*100).toFixed(1):0;
  var meetBelowPct=finished.length>0?(((meet+below)/finished.length)*100).toFixed(1):0;

  // Summary
  var bestDept='',worstDept='',bestAvg=0,worstAvg=999;
  var deptList=d==='全部'?DATA.d4:[d];
  deptList.forEach(function(dep){
    var recs=finished.filter(function(r){return r[3]===dep&&r[4]!==null});
    if(recs.length===0)return;
    var s=0;recs.forEach(function(r){s+=r[4]});var avg=s/recs.length;
    if(avg>bestAvg){bestAvg=avg;bestDept=dep}
    if(avg<worstAvg){worstAvg=avg;worstDept=dep}
  });
  var sumText='本月考核<b>'+finished.length+'人</b>（已结束），平均绩效分<b>'+avgScore+'</b>。超出预期<b>'+exceed+'人('+exceedPct+'%)</b>，符合预期及低于预期<b>'+(meet+below)+'人('+meetBelowPct+'%)</b>。';
  if(bestDept)sumText+='平均绩效最高部门<b style="color:#43a047">'+bestDept+'('+bestAvg.toFixed(2)+')</b>';
  if(worstDept&&worstDept!==bestDept)sumText+='，最低部门<b style="color:#e53935">'+worstDept+'('+worstAvg.toFixed(2)+')</b>';
  sumText+='。';
  document.getElementById('sum3').innerHTML=sumText;

  // KPIs
  document.getElementById('kpi3').innerHTML=
    kpiCard('考核人数(已结束)',finished.length,'人')+
    kpiCard('平均绩效分',avgScore,'分')+
    kpiCard('超出预期占比',exceedPct,'%')+
    kpiCard('符合预期及低于预期',meetBelowPct,'%');

  // Grade doughnut
  dc('c3_grade');
  var gradeCounts={};
  var gradeOrder=['超出预期','符合预期+','符合预期','符合预期-','低于预期'];
  gradeOrder.forEach(function(g){gradeCounts[g]=0});
  finished.forEach(function(r){if(r[5])gradeCounts[r[5]]=(gradeCounts[r[5]]||0)+1});
  var gLabels=gradeOrder.filter(function(g){return gradeCounts[g]>0});
  var gData=gLabels.map(function(g){return gradeCounts[g]});
  charts['c3_grade']=new Chart(document.getElementById('c3_grade'),{
    type:'doughnut',
    data:{labels:gLabels,datasets:[{data:gData,backgroundColor:['#1a237e','#3949ab','#5c6bc0','#9fa8da','#e53935']}]},
    options:{responsive:true,plugins:{legend:{position:'bottom'}},
      onClick:function(evt,els){
        if(!els.length)return;
        var grade=gLabels[els[0].index];
        var recs=finished.filter(function(r){return r[5]===grade});
        var rows=recs.map(function(r){return[r[0],r[3],r[2],r[4],r[5]]});
        showModal(grade+' 人员明细',buildTable(['工号','部门','小组','分数','等级'],rows));
      }
    }
  });

  // Score distribution
  dc('c3_score');
  var scoreBuckets={'<2.0':0,'2.0-2.5':0,'2.5-3.0':0,'3.0-3.5':0,'3.5-4.0':0,'≥4.0':0};
  withScore.forEach(function(r){
    var s=r[4];
    if(s<2.0)scoreBuckets['<2.0']++;
    else if(s<2.5)scoreBuckets['2.0-2.5']++;
    else if(s<3.0)scoreBuckets['2.5-3.0']++;
    else if(s<3.5)scoreBuckets['3.0-3.5']++;
    else if(s<4.0)scoreBuckets['3.5-4.0']++;
    else scoreBuckets['≥4.0']++;
  });
  var scLabels=Object.keys(scoreBuckets),scData=Object.values(scoreBuckets);
  charts['c3_score']=new Chart(document.getElementById('c3_score'),{
    type:'bar',
    data:{labels:scLabels,datasets:[{label:'人数',data:scData,backgroundColor:COLORS.slice(0,6)}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}},
      onClick:function(evt,els){
        if(!els.length)return;
        var bucket=scLabels[els[0].index];
        var recs=withScore.filter(function(r){
          var s=r[4];
          if(bucket==='<2.0')return s<2.0;
          if(bucket==='2.0-2.5')return s>=2.0&&s<2.5;
          if(bucket==='2.5-3.0')return s>=2.5&&s<3.0;
          if(bucket==='3.0-3.5')return s>=3.0&&s<3.5;
          if(bucket==='3.5-4.0')return s>=3.5&&s<4.0;
          return s>=4.0;
        });
        var rows=recs.map(function(r){return[r[0],r[3],r[4],r[5]]});
        showModal(bucket+' 分数段人员',buildTable(['工号','部门','分数','等级'],rows));
      }
    }
  });

  // Dept grade stacked bar
  dc('c3_deptgrade');
  var dgLabels=[],dgDatasets=[];
  deptList.forEach(function(dep){dgLabels.push(dep)});
  var gradeColors={'超出预期':'#1a237e','符合预期+':'#3949ab','符合预期':'#5c6bc0','符合预期-':'#9fa8da','低于预期':'#e53935'};
  gradeOrder.forEach(function(g){
    var data=[];
    deptList.forEach(function(dep){
      data.push(finished.filter(function(r){return r[3]===dep&&r[5]===g}).length);
    });
    dgDatasets.push({label:g,data:data,backgroundColor:gradeColors[g]});
  });
  charts['c3_deptgrade']=new Chart(document.getElementById('c3_deptgrade'),{
    type:'bar',
    data:{labels:dgLabels,datasets:dgDatasets},
    options:{responsive:true,scales:{x:{stacked:true},y:{stacked:true,beginAtZero:true}},plugins:{legend:{position:'top'}},
      onClick:function(evt,els){
        if(!els.length)return;
        var idx=els[0].index;var dsIdx=els[0].datasetIndex;
        var dep=dgLabels[idx];var grade=gradeOrder[dsIdx];
        var recs=finished.filter(function(r){return r[3]===dep&&r[5]===grade});
        var rows=recs.map(function(r){return[r[0],r[2],r[4],r[5]]});
        showModal(dep+' '+grade+' 人员',buildTable(['工号','小组','分数','等级'],rows));
      }
    }
  });

  // Dept avg score
  dc('c3_deptavg');
  var daLabels=[],daData=[];
  deptList.forEach(function(dep){
    daLabels.push(dep);
    var recs=finished.filter(function(r){return r[3]===dep&&r[4]!==null});
    if(recs.length===0){daData.push(0);return}
    var s=0;recs.forEach(function(r){s+=r[4]});
    daData.push(parseFloat((s/recs.length).toFixed(2)));
  });
  charts['c3_deptavg']=new Chart(document.getElementById('c3_deptavg'),{
    type:'bar',
    data:{labels:daLabels,datasets:[{label:'平均绩效分',data:daData,backgroundColor:'#3949ab'}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,max:5}},
      onClick:function(evt,els){
        if(!els.length)return;
        var dep=daLabels[els[0].index];
        var recs=finished.filter(function(r){return r[3]===dep&&r[4]!==null});
        recs.sort(function(a,b){return b[4]-a[4]});
        var rows=recs.map(function(r){return[r[0],r[2],r[4],r[5]]});
        showModal(dep+' 绩效明细',buildTable(['工号','小组','分数','等级'],rows));
      }
    }
  });

  // Health table
  var healthHtml='<table class="health-table"><thead><tr><th>部门</th><th>考核人数</th><th>平均分</th><th>超出预期</th><th>低于预期</th><th>健康度</th></tr></thead><tbody>';
  deptList.forEach(function(dep){
    var recs=finished.filter(function(r){return r[3]===dep});
    var withS=recs.filter(function(r){return r[4]!==null});
    var cnt=recs.length;
    var avg=0;if(withS.length>0){var s=0;withS.forEach(function(r){s+=r[4]});avg=(s/withS.length).toFixed(2)}
    var exc=recs.filter(function(r){return r[5]==='超出预期'}).length;
    var bel=recs.filter(function(r){return r[5]==='低于预期'}).length;
    var dot='dot-gray';
    if(cnt>=3){
      var excPct=exc/cnt;var belPct=bel/cnt;
      if(avg>=3.2&&belPct<0.1)dot='dot-green';
      else if(avg>=2.5&&belPct<0.2)dot='dot-yellow';
      else if(cnt>0)dot='dot-red';
    }else if(cnt>0){dot='dot-yellow'}
    healthHtml+='<tr><td>'+dep+'</td><td>'+cnt+'</td><td>'+avg+'</td><td>'+exc+'</td><td>'+bel+'</td><td><span class="dot '+dot+'"></span>'+(dot==='dot-green'?'健康':dot==='dot-yellow'?'关注':dot==='dot-red'?'预警':'-')+'</td></tr>';
  });
  healthHtml+='</tbody></table>';
  document.getElementById('healthTbl').innerHTML=healthHtml;

  // New hire performance
  renderNewHirePerf(d,m,p,deptList,finished);
}

function renderNewHirePerf(d,m,p,deptList,finished){
  // New hires: hireYM within selected month or recent 3 months
  var mIdx=getMonthIdx(m);
  var recentMonths=[];
  for(var i=Math.max(0,mIdx-2);i<=mIdx;i++){recentMonths.push(DATA.mM[i])}
  var newHires=DATA.R.filter(function(r){return recentMonths.indexOf(r[4])>=0&&r[1]!=='离职'});
  if(d!=='全部') newHires=newHires.filter(function(r){return r[2]===d});
  var newHireIds={};
  newHires.forEach(function(r){newHireIds[r[0]]=r});

  // Get their perf data for current period
  var nhPerf=finished.filter(function(r){return newHireIds[r[0]]});
  var nhWithScore=nhPerf.filter(function(r){return r[4]!==null});
  var allWithScore=finished.filter(function(r){return r[4]!==null});

  var nhAvg=0,allAvg=0;
  if(nhWithScore.length>0){var s=0;nhWithScore.forEach(function(r){s+=r[4]});nhAvg=s/nhWithScore.length}
  if(allWithScore.length>0){var s2=0;allWithScore.forEach(function(r){s2+=r[4]});allAvg=s2/allWithScore.length}

  // Bar chart: new hire avg vs overall avg by dept
  dc('c3_newhire');
  var nhBarLabels=[],nhBarData=[],allBarData=[];
  deptList.forEach(function(dep){
    nhBarLabels.push(dep);
    var nhRecs=nhWithScore.filter(function(r){return r[3]===dep});
    var allRecs=allWithScore.filter(function(r){return r[3]===dep});
    var nhA=0,alA=0;
    if(nhRecs.length>0){var s=0;nhRecs.forEach(function(r){s+=r[4]});nhA=s/nhRecs.length}
    if(allRecs.length>0){var s2=0;allRecs.forEach(function(r){s2+=r[4]});alA=s2/allRecs.length}
    nhBarData.push(parseFloat(nhA.toFixed(2)));
    allBarData.push(parseFloat(alA.toFixed(2)));
  });
  charts['c3_newhire']=new Chart(document.getElementById('c3_newhire'),{
    type:'bar',
    data:{labels:nhBarLabels,datasets:[
      {label:'新入职平均分',data:nhBarData,backgroundColor:'#ef6c00'},
      {label:'全员平均分',data:allBarData,backgroundColor:'#3949ab'}
    ]},
    options:{responsive:true,plugins:{legend:{position:'top'}},scales:{y:{beginAtZero:true,max:5}},
      onClick:function(evt,els){
        if(!els.length)return;
        var dep=nhBarLabels[els[0].index];
        var recs=nhWithScore.filter(function(r){return r[3]===dep});
        var rows=recs.map(function(r){return[r[0],r[2],r[4],r[5],newHireIds[r[0]][4]]});
        showModal(dep+' 新入职人员绩效',buildTable(['工号','小组','分数','等级','入职月份'],rows));
      }
    }
  });

  // Detail table
  var tblHtml='<h4>新入职人员绩效明细（近3个月入职，共'+newHires.length+'人）</h4>';
  tblHtml+='<table class="nh-table"><thead><tr><th>工号</th><th>部门</th><th>小组</th><th>入职月份</th><th>绩效分数</th><th>绩效等级</th><th>考核状态</th></tr></thead><tbody>';
  newHires.forEach(function(r){
    var perfRec=DATA.P.find(function(p){return p[0]===r[0]&&p[1]===monthToPeriod(m)});
    var score=perfRec&&perfRec[4]!==null?perfRec[4]:'-';
    var grade=perfRec?perfRec[5]||'-':'-';
    var status=perfRec?perfRec[7]||'-':'-';
    tblHtml+='<tr><td>'+r[0]+'</td><td>'+r[2]+'</td><td>'+(r[3]||'-')+'</td><td>'+r[4]+'</td><td>'+score+'</td><td>'+grade+'</td><td>'+status+'</td></tr>';
  });
  tblHtml+='</tbody></table>';
  if(newHires.length===0) tblHtml='<p style="color:#999;padding:10px">本期无新入职人员</p>';
  document.getElementById('newhireTbl').innerHTML=tblHtml;
}

/* ===== TAB 4: 离职预警 ===== */
function renderTab4(){
  var d=curDept();
  var leavers=DATA.R.filter(function(r){return r[1]==='离职'});
  if(d!=='全部') leavers=leavers.filter(function(r){return r[2]===d});

  var totalLeave=leavers.length;
  var monthCount={};
  DATA.mM.forEach(function(mm){monthCount[mm]=0});
  leavers.forEach(function(r){if(r[5])monthCount[r[5]]=(monthCount[r[5]]||0)+1});
  var activeMonths=DATA.mM.filter(function(mm){return monthCount[mm]>0}).length;
  var avgPerMonth=activeMonths>0?(totalLeave/activeMonths).toFixed(1):0;

  var totalActive=activeEmps().length+(d==='全部'?DATA.R.filter(function(r){return r[1]==='离职'}).length:DATA.R.filter(function(r){return r[1]==='离职'&&r[2]===d}).length);
  var leaveRate=totalActive>0?((totalLeave/totalActive)*100).toFixed(1):0;

  var voluntary=leavers.filter(function(r){return r[7]==='合同期内辞职'}).length;
  var volPct=totalLeave>0?((voluntary/totalLeave)*100).toFixed(1):0;

  // Summary
  var leaveByDept={};
  var allLeavers=d==='全部'?DATA.R.filter(function(r){return r[1]==='离职'}):leavers;
  allLeavers.forEach(function(r){leaveByDept[r[2]]=(leaveByDept[r[2]]||0)+1});
  var topDept=Object.keys(leaveByDept).sort(function(a,b){return leaveByDept[b]-leaveByDept[a]})[0]||'-';
  var topDeptCnt=leaveByDept[topDept]||0;

  var reasonCounts={};
  leavers.forEach(function(r){if(r[8])reasonCounts[r[8]]=(reasonCounts[r[8]]||0)+1});
  var topReason=Object.keys(reasonCounts).sort(function(a,b){return reasonCounts[b]-reasonCounts[a]})[0]||'暂无';

  document.getElementById('sum4').innerHTML='累计离职<b>'+totalLeave+'人</b>，月均<b>'+avgPerMonth+'人</b>，离职率<b>'+leaveRate+'%</b>。主动离职（合同期内辞职）占比<b>'+volPct+'%</b>。离职最多部门为<b style="color:#e53935">'+topDept+'('+topDeptCnt+'人)</b>，主要离职原因为<b style="color:#ef6c00">'+topReason+'</b>。';

  // KPIs
  document.getElementById('kpi4').innerHTML=
    kpiCard('离职总数',totalLeave,'人')+
    kpiCard('月均离职',avgPerMonth,'人/月')+
    kpiCard('离职率',leaveRate,'%')+
    kpiCard('主动离职占比',volPct,'%');

  // Reason doughnut
  dc('c4_reason');
  var rLabels=Object.keys(reasonCounts),rData=Object.values(reasonCounts);
  if(rLabels.length===0){rLabels=['暂无'];rData=[0]}
  charts['c4_reason']=new Chart(document.getElementById('c4_reason'),{
    type:'doughnut',
    data:{labels:rLabels,datasets:[{data:rData,backgroundColor:COLORS.slice(0,rLabels.length)}]},
    options:{responsive:true,plugins:{legend:{position:'bottom'}},
      onClick:function(evt,els){
        if(!els.length)return;
        var reason=rLabels[els[0].index];
        var recs=leavers.filter(function(r){return r[8]===reason});
        var rows=recs.map(function(r){return[r[0],r[2],r[5],r[7]]});
        showModal(reason+' 离职人员',buildTable(['工号','部门','离职月份','离职类型'],rows));
      }
    }
  });

  // Type doughnut
  dc('c4_type');
  var typeCounts={};
  leavers.forEach(function(r){if(r[7])typeCounts[r[7]]=(typeCounts[r[7]]||0)+1});
  var tLabels=Object.keys(typeCounts),tData=Object.values(typeCounts);
  if(tLabels.length===0){tLabels=['暂无'];tData=[0]}
  charts['c4_type']=new Chart(document.getElementById('c4_type'),{
    type:'doughnut',
    data:{labels:tLabels,datasets:[{data:tData,backgroundColor:['#e53935','#ef6c00','#ff9800','#ffc107']}]},
    options:{responsive:true,plugins:{legend:{position:'bottom'}},
      onClick:function(evt,els){
        if(!els.length)return;
        var tp=tLabels[els[0].index];
        var recs=leavers.filter(function(r){return r[7]===tp});
        var rows=recs.map(function(r){return[r[0],r[2],r[5],r[8]]});
        showModal(tp+' 离职人员',buildTable(['工号','部门','离职月份','离职原因'],rows));
      }
    }
  });

  // Monthly trend line
  dc('c4_trend');
  var trendLabels=[],trendData=[];
  DATA.mM.forEach(function(mm){
    trendLabels.push(mm.replace('2026-','')+'月');
    var cnt=leavers.filter(function(r){return r[5]===mm}).length;
    trendData.push(cnt);
  });
  charts['c4_trend']=new Chart(document.getElementById('c4_trend'),{
    type:'line',
    data:{labels:trendLabels,datasets:[{label:'离职人数',data:trendData,borderColor:'#e53935',backgroundColor:'rgba(229,57,53,.15)',fill:true,tension:.3,pointRadius:5,pointBackgroundColor:'#e53935'}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}},
      onClick:function(evt,els){
        if(!els.length)return;
        var idx=els[0].index;var mm=DATA.mM[idx];
        var recs=leavers.filter(function(r){return r[5]===mm});
        var rows=recs.map(function(r){return[r[0],r[2],r[7],r[8]]});
        showModal(mm+' 离职人员',buildTable(['工号','部门','离职类型','离职原因'],rows));
      }
    }
  });

  // Dept bar
  dc('c4_dept');
  var deptList=d==='全部'?DATA.d4:[d];
  var dLabels=[],dData=[];
  var allLeavers=DATA.R.filter(function(r){return r[1]==='离职'});
  deptList.forEach(function(dep){
    dLabels.push(dep);
    dData.push(allLeavers.filter(function(r){return r[2]===dep}).length);
  });
  charts['c4_dept']=new Chart(document.getElementById('c4_dept'),{
    type:'bar',
    data:{labels:dLabels,datasets:[{label:'离职人数',data:dData,backgroundColor:'#e53935'}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}},
      onClick:function(evt,els){
        if(!els.length)return;
        var dep=dLabels[els[0].index];
        var recs=allLeavers.filter(function(r){return r[2]===dep});
        var rows=recs.map(function(r){return[r[0],r[5],r[7],r[8]]});
        showModal(dep+' 离职人员',buildTable(['工号','离职月份','离职类型','离职原因'],rows));
      }
    }
  });

  // Detail table
  var tblHtml='<table class="health-table"><thead><tr><th>工号</th><th>部门</th><th>小组</th><th>入职月份</th><th>离职月份</th><th>离职类型</th><th>离职原因</th></tr></thead><tbody>';
  leavers.forEach(function(r){
    tblHtml+='<tr><td>'+r[0]+'</td><td>'+r[2]+'</td><td>'+(r[3]||'-')+'</td><td>'+(r[4]||'-')+'</td><td>'+(r[5]||'-')+'</td><td>'+(r[7]||'-')+'</td><td>'+(r[8]||'-')+'</td></tr>';
  });
  tblHtml+='</tbody></table>';
  if(leavers.length===0)tblHtml='<p style="color:#999;padding:20px;text-align:center">暂无离职记录</p>';
  document.getElementById('leaveTbl').innerHTML=tblHtml;
}

/* ===== Render All ===== */
function renderAll(){renderTab1();renderTab2();renderTab3();renderTab4()}
renderAll();
</script>
